/* ---------- HERO COMMITTENTE: calcoli ---------- */

// Avanzamento complessivo del cantiere: media delle attività pesata sulla
// durata (giorni inizio→fine). Le attività senza date pesano 1.
// Restituisce un intero 0-100, oppure null se non ci sono attività.
function avanzamentoComplessivo() {
  const c = state.cantiere;
  if (!c || !c.attivita || !c.attivita.length) return null;
  let wSum = 0, pSum = 0;
  c.attivita.forEach(a => {
    const av = Math.max(0, Math.min(100, parseFloat(a.avanzamento) || 0));
    let w = 1;
    if (a.inizio && a.fine) {
      const d = daysBetween(a.inizio, a.fine);
      if (d && d > 0) w = d;
    }
    wSum += w;
    pSum += av * w;
  });
  if (wSum === 0) return 0;
  return Math.round(pSum / wSum);
}

// Prossima tappa: prima attività non conclusa. Priorità a quelle già in corso,
// poi per data di inizio più vicina.
function prossimaTappa() {
  const c = state.cantiere;
  if (!c || !c.attivita) return null;
  const aperte = c.attivita.filter(a => {
    if (!a.nome) return false;
    const av = parseFloat(a.avanzamento) || 0;
    const st = (a.stato || '').toLowerCase();
    const chiusa = av >= 100 || st.includes('complet') || st.includes('consegn')
                || st.includes('finit') || st.includes('collaud') || st.includes('conclus');
    return !chiusa;
  });
  if (!aperte.length) return null;
  aperte.sort((a, b) => {
    const inCorsoA = (parseFloat(a.avanzamento) || 0) > 0 ? 0 : 1;
    const inCorsoB = (parseFloat(b.avanzamento) || 0) > 0 ? 0 : 1;
    if (inCorsoA !== inCorsoB) return inCorsoA - inCorsoB;
    return (a.inizio || '9999-99-99').localeCompare(b.inizio || '9999-99-99');
  });
  return aperte[0];
}

/* ---------- HERO COMMITTENTE: render ---------- */
function renderClienteHero() {
  const c = state.cantiere;
  if (!c) return '';
  const a = c.anagrafica;

  // — Anello avanzamento —
  const pct = avanzamentoComplessivo();
  const hasAtt = pct !== null;
  const pctVal = hasAtt ? pct : 0;
  const R = 46, CIRC = 2 * Math.PI * R;
  const offset = CIRC * (1 - pctVal / 100);
  let ringLabel, ringSub;
  if (!hasAtt)            { ringLabel = 'In avvio';        ringSub = 'Le attività verranno pianificate a breve.'; }
  else if (pctVal >= 100) { ringLabel = 'Lavori conclusi'; ringSub = 'Tutte le attività sono completate.'; }
  else if (pctVal >= 66)  { ringLabel = 'Fase finale';     ringSub = "Il cantiere è in dirittura d'arrivo."; }
  else if (pctVal >= 33)  { ringLabel = 'In pieno corso';  ringSub = 'I lavori procedono regolarmente.'; }
  else                    { ringLabel = 'Avvio lavori';    ringSub = 'Le prime fasi sono in corso.'; }

  // — Prossima tappa —
  const next = prossimaTappa();
  let nextHTML;
  if (next) {
    const av = parseFloat(next.avanzamento) || 0;
    const inCorso = av > 0;
    const periodo = next.inizio
      ? (next.fine ? `${fmtDate(next.inizio)} → ${fmtDate(next.fine)}` : fmtDate(next.inizio))
      : '';
    nextHTML = `
      <div class="ch-next-name">${escapeHtml(next.nome)}</div>
      <div class="ch-next-meta">
        <span class="pill ${inCorso ? 'progress' : 'previsto'}">${inCorso ? 'In corso' : 'Prossima'}</span>
        ${periodo ? `<span class="date">${periodo}</span>` : ''}
        ${inCorso ? `<span>· ${av}% completata</span>` : ''}
      </div>`;
  } else if (hasAtt) {
    nextHTML = `<div class="ch-next-empty">Tutte le attività sono completate.</div>`;
  } else {
    nextHTML = `<div class="ch-next-empty">Pianificazione in corso.</div>`;
  }

  // — Countdown consegna —
  let countHTML = '';
  if (a.data_fine) {
    const msDay = 86400000;
    const d1 = new Date(todayISO() + 'T00:00:00');
    const d2 = new Date(a.data_fine + 'T00:00:00');
    const mancanti = Math.round((d2 - d1) / msDay);
    if (hasAtt && pctVal >= 100) {
      countHTML = `<div class="big done">✓</div><div class="unit">Consegnato</div><div class="date-line">${fmtDate(a.data_fine)}</div>`;
    } else if (mancanti > 0) {
      countHTML = `<div class="big">${mancanti}</div><div class="unit">${mancanti === 1 ? 'Giorno alla consegna' : 'Giorni alla consegna'}</div><div class="date-line">Prevista ${fmtDate(a.data_fine)}</div>`;
    } else if (mancanti === 0) {
      countHTML = `<div class="big">Oggi</div><div class="unit">Consegna prevista</div><div class="date-line">${fmtDate(a.data_fine)}</div>`;
    } else {
      countHTML = `<div class="big late">+${Math.abs(mancanti)}</div><div class="unit">${Math.abs(mancanti) === 1 ? 'Giorno oltre la previsione' : 'Giorni oltre la previsione'}</div><div class="date-line">Prevista ${fmtDate(a.data_fine)}</div>`;
    }
  }

  return `
    <div class="cliente-hero">
      <div class="ch-ring">
        <div class="ch-ring-wrap">
          <svg width="104" height="104" viewBox="0 0 104 104">
            <circle class="ring-track" cx="52" cy="52" r="${R}" fill="none" stroke-width="9"/>
            <circle class="ring-arc" cx="52" cy="52" r="${R}" fill="none" stroke-width="9"
              stroke-dasharray="${CIRC.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
          </svg>
          <div class="ch-ring-center">
            <div class="ch-ring-pct">${pctVal}<span class="sym">%</span></div>
            <div class="ch-ring-label">Avanzamento</div>
          </div>
        </div>
        <div class="ch-ring-side">
          <div class="ttl">${ringLabel}</div>
          <div class="sub">${ringSub}</div>
        </div>
      </div>

      <div class="ch-next">
        <div class="ch-eyebrow"><span class="icn">${I.calendar}</span> Prossima tappa</div>
        ${nextHTML}
      </div>

      <div class="ch-count">
        ${countHTML || '<div class="ch-next-empty" style="font-size:15px; line-height:1.3;">Data di consegna<br>da definire</div>'}
      </div>
    </div>
  `;
}

  ).join('');

      <div class="filtro-search">

      </div>

// Colori brand per il PDF (RGB)
const PDF_COLORS = {
  petrolio:   [42, 70, 81],     // #2A4651 — testata tabella
  ottone:     [168, 133, 74],   // #A8854A — accenti
  ink:        [28, 24, 18],     // #1C1812 — testo
  inkSoft:    [90, 84, 74],     // testo secondario
  bgAlt:      [247, 243, 234],  // righe alternate
  bgTot:      [236, 226, 207],  // riga totali
  rule:       [214, 205, 188],  // linee
};

// Denaro per PDF: stessa formattazione it-IT ma con spazi normali (i font PDF
// standard non rendono correttamente gli spazi unificatori di Intl)
function pdfMoney(n) {
  const s = fmtMoneyDecimal(n);
  return s === '—' ? '—' : s.replace(/[\u00A0\u202F]/g, ' ');
}
function pdfDate(iso) { return iso ? fmtDate(iso) : '—'; }
function pdfText(s) { return (s == null || s === '') ? '—' : String(s); }

// I font standard PDF (helvetica) non includono il glifo 'ō':
// scrivo 'o' e disegno il macron a mano sopra la lettera.
function pdfBrandText(doc, str, x, y, opts = {}) {
  const fontSize = doc.getFontSize();
  const mmEm = fontSize * 0.3528;          // dimensione font in mm
  const plain = str.replace(/ō/g, 'o');
  let startX = x;
  if (opts.align === 'right') startX = x - doc.getTextWidth(plain);
  doc.text(plain, startX, y);
  const color = opts.color || PDF_COLORS.ink;
  doc.setDrawColor(...color);
  doc.setLineWidth(Math.max(mmEm * 0.05, 0.2));
  for (let i = 0; i < str.length; i++) {
    if (str[i] !== 'ō') continue;
    const wBefore = doc.getTextWidth(str.slice(0, i).replace(/ō/g, 'o'));
    const wO = doc.getTextWidth('o');
    const yTop = y - mmEm * 0.64;          // poco sopra la 'o' minuscola
    doc.line(startX + wBefore + wO * 0.15, yTop, startX + wBefore + wO * 0.85, yTop);
  }
}

// Configurazione colonne e righe per ciascuna sezione esportabile.
// Le larghezze (mm) sono fisse e sommano alla larghezza utile di un A4
// orizzontale (277mm con margini 10mm): così la griglia è identica su
// tutte le pagine e nulla risulta sfalsato.
const PDF_SECTIONS = {
  forniture: {
    titolo: 'Ordini Forniture',
    tipo: 'costi',
    descrLabel: 'Materiale / Prodotto', descrField: 'prodotto',
    soggLabel: 'Fornitore', soggField: 'fornitore',
    dateLabels: ['Data ordine', 'Consegna prev.', 'Consegna eff.'],
    dateFields: ['data_ordine', 'consegna_prev', 'consegna_eff'],
    totLabel: 'Totale ordini forniture (IVA inclusa)',
  },
  costiTecnici: {
    titolo: 'Costi Tecnici',
    tipo: 'costi',
    descrLabel: 'Descrizione prestazione', descrField: 'descrizione',
    soggLabel: 'Professionista / Studio', soggField: 'professionista',
    dateLabels: ['Data preventivo', 'Data approvazione', 'Data saldo'],
    dateFields: ['data_prev', 'data_appr', 'data_saldo'],
    totLabel: 'Totale costi tecnici (IVA inclusa)',
  },
  costiCostruzione: {
    titolo: 'Costi di Costruzione',
    tipo: 'costi',
    descrLabel: 'Descrizione voce', descrField: 'descrizione',
    soggLabel: 'Impresa / Fornitore', soggField: 'professionista',
    dateLabels: ['Data preventivo', 'Data approvazione', 'Data saldo'],
    dateFields: ['data_prev', 'data_appr', 'data_saldo'],
    totLabel: 'Totale costi di costruzione (IVA inclusa)',
  },
  pagamenti: {
    titolo: 'Cronoprogramma Pagamenti',
    tipo: 'pagamenti',
    totLabel: 'Totale pagamenti',
  },
};

function exportPDF(sezione) {
  const cfg = PDF_SECTIONS[sezione];
  const c = state.cantiere;
  if (!cfg || !c) return;

  if (!window.jspdf || !window.jspdf.jsPDF) {
    toast('Libreria PDF non ancora caricata, riprova tra un istante', 'error');
    return;
  }

  const rows = sortedRows(sezione);          // rispetta filtri e ordinamento correnti
  const rowsRaw = c[sezione] || [];
  if (!rows.length) { toast('Nessuna riga da esportare', 'error'); return; }

  const f = state.filtri && state.filtri[sezione];
  const filtriAttivi = !!(f && ((f.q && f.q.trim()) || f.stato));

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  const MARGIN = 10;
  const HEADER_H1 = 30;   // altezza intestazione documento (pagina 1)
  const HEADER_HN = 14;   // altezza intestazione slim (pagine successive)
  const FOOTER_H = 10;

  const anag = c.anagrafica || {};
  const nomeCantiere = anag.nome || 'Cantiere';
  const oggi = fmtDate(todayISO());
  const totalPagesExp = '{tot}';

  // --- Costruzione head/body/foot/columnStyles per tipo sezione ---
  let head, body, foot, columnStyles;

  if (cfg.tipo === 'costi') {
    head = [[
      '#', 'N° Ordine', cfg.descrLabel, cfg.soggLabel, 'Q.tà', 'U.M.',
      'Costo unit.', 'IVA', 'Costo tot.',
      cfg.dateLabels[0], cfg.dateLabels[1], cfg.dateLabels[2], 'Stato',
    ]];
    const [d1, d2, d3] = cfg.dateFields;
    body = rows.map(r => {
      const num = rowsRaw.findIndex(x => x.id === r.id) + 1;
      const tot = rowTotal(r);
      return [
        String(num),
        pdfText(r.n_ordine),
        pdfText(r[cfg.descrField]),
        pdfText(r[cfg.soggField]),
        r.quantita == null ? '—' : String(r.quantita).replace('.', ','),
        pdfText(r.um),
        r.costo_unit == null ? '—' : pdfMoney(r.costo_unit),
        pdfText(r.iva),
        tot ? pdfMoney(tot) : '—',
        pdfDate(r[d1]), pdfDate(r[d2]), pdfDate(r[d3]),
        pdfText(r.stato),
      ];
    });
    const totAll = sumImporti(rows);
    foot = [[
      { content: cfg.totLabel, colSpan: 8, styles: { halign: 'right' } },
      { content: pdfMoney(totAll), styles: { halign: 'right' } },
      { content: '', colSpan: 4 },
    ]];
    // Somma larghezze = 277mm (utile A4 landscape con margini 10mm)
    columnStyles = {
      0:  { cellWidth: 8,  halign: 'center' },                 // #
      1:  { cellWidth: 18 },                                   // N° Ordine
      2:  { cellWidth: 56 },                                   // Descrizione
      3:  { cellWidth: 38 },                                   // Soggetto
      4:  { cellWidth: 12, halign: 'right' },                  // Q.tà
      5:  { cellWidth: 12, halign: 'center' },                 // U.M.
      6:  { cellWidth: 21, halign: 'right' },                  // Costo unit.
      7:  { cellWidth: 12, halign: 'center' },                 // IVA
      8:  { cellWidth: 24, halign: 'right', fontStyle: 'bold' }, // Costo tot.
      9:  { cellWidth: 19, halign: 'center' },                 // Data 1
      10: { cellWidth: 19, halign: 'center' },                 // Data 2
      11: { cellWidth: 19, halign: 'center' },                 // Data 3
      12: { cellWidth: 19 },                                   // Stato
    };
  } else {
    head = [[
      '#', 'Causale', 'Fornitore', 'Descrizione', 'Importo prev.',
      'Data prevista', 'Data fattura', 'N° Fattura', 'Incassato',
      'Data incasso', 'Residuo', '%', 'Stato',
    ]];
    body = rows.map(r => {
      const num = rowsRaw.findIndex(x => x.id === r.id) + 1;
      const prev = parseFloat(r.importo_prev) || 0;
      const inc = parseFloat(r.importo_incass) || 0;
      return [
        String(num),
        pdfText(r.causale),
        pdfText(r.fornitore),
        pdfText(r.descrizione),
        r.importo_prev == null ? '—' : pdfMoney(prev),
        pdfDate(r.data_prevista),
        pdfDate(r.data_fattura),
        pdfText(r.n_fattura),
        r.importo_incass == null ? '—' : pdfMoney(inc),
        pdfDate(r.data_incasso),
        prev ? pdfMoney(prev - inc) : '—',
        prev ? Math.round((inc / prev) * 100) + '%' : '—',
        pdfText(r.stato),
      ];
    });
    const totPrev = rows.reduce((s, p) => s + (parseFloat(p.importo_prev) || 0), 0);
    const totInc  = rows.reduce((s, p) => s + (parseFloat(p.importo_incass) || 0), 0);
    foot = [[
      { content: cfg.totLabel, colSpan: 4, styles: { halign: 'right' } },
      { content: pdfMoney(totPrev), styles: { halign: 'right' } },
      { content: '', colSpan: 3 },
      { content: pdfMoney(totInc), styles: { halign: 'right' } },
      { content: '' },
      { content: pdfMoney(totPrev - totInc), styles: { halign: 'right' } },
      { content: totPrev > 0 ? Math.round((totInc / totPrev) * 100) + '%' : '—', styles: { halign: 'right' } },
      { content: '' },
    ]];
    columnStyles = {
      0:  { cellWidth: 8,  halign: 'center' },                 // #
      1:  { cellWidth: 23 },                                   // Causale
      2:  { cellWidth: 30 },                                   // Fornitore
      3:  { cellWidth: 49 },                                   // Descrizione
      4:  { cellWidth: 23, halign: 'right' },                  // Importo prev.
      5:  { cellWidth: 18, halign: 'center' },                 // Data prevista
      6:  { cellWidth: 18, halign: 'center' },                 // Data fattura
      7:  { cellWidth: 19 },                                   // N° Fattura
      8:  { cellWidth: 23, halign: 'right' },                  // Incassato
      9:  { cellWidth: 18, halign: 'center' },                 // Data incasso
      10: { cellWidth: 23, halign: 'right', fontStyle: 'bold' }, // Residuo
      11: { cellWidth: 9,  halign: 'right' },                  // %
      12: { cellWidth: 16 },                                   // Stato
    };
  }

  // --- Intestazione di pagina (completa su pag. 1, slim sulle successive) ---
  const drawHeader = (pageNumber) => {
    const pw = doc.internal.pageSize.getWidth();
    if (pageNumber === 1) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      doc.setTextColor(...PDF_COLORS.petrolio);
      pdfBrandText(doc, 'ekōD — ' + cfg.titolo, MARGIN, MARGIN + 6, { color: PDF_COLORS.petrolio });

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(...PDF_COLORS.ink);
      doc.text('Cantiere: ' + nomeCantiere, MARGIN, MARGIN + 13);

      doc.setFontSize(8.5);
      doc.setTextColor(...PDF_COLORS.inkSoft);
      const sub = [];
      if (anag.committente) sub.push('Committente: ' + anag.committente);
      if (anag.indirizzo) sub.push(anag.indirizzo);
      if (sub.length) doc.text(sub.join('   ·   '), MARGIN, MARGIN + 18);
      doc.text('Generato il ' + oggi + (filtriAttivi ? '   ·   Vista filtrata' : ''), pw - MARGIN, MARGIN + 6, { align: 'right' });

      doc.setDrawColor(...PDF_COLORS.ottone);
      doc.setLineWidth(0.6);
      doc.line(MARGIN, MARGIN + 22, pw - MARGIN, MARGIN + 22);
    } else {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...PDF_COLORS.petrolio);
      pdfBrandText(doc, 'ekōD — ' + cfg.titolo + '   ·   ' + nomeCantiere, MARGIN, MARGIN + 4, { color: PDF_COLORS.petrolio });
      doc.setDrawColor(...PDF_COLORS.rule);
      doc.setLineWidth(0.3);
      doc.line(MARGIN, MARGIN + 7, pw - MARGIN, MARGIN + 7);
    }
  };

  const drawFooter = (pageNumber) => {
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(...PDF_COLORS.inkSoft);
    pdfBrandText(doc, 'Studio ekōD — FVS s.r.l.', MARGIN, ph - 6, { color: PDF_COLORS.inkSoft });
    doc.text('Pagina ' + pageNumber + ' di ' + totalPagesExp, pw - MARGIN, ph - 6, { align: 'right' });
  };

  doc.autoTable({
    head, body, foot, columnStyles,
    startY: MARGIN + HEADER_H1 - 4,
    // Margine superiore identico per tutte le pagine successive: la tabella
    // riparte sempre alla stessa quota → pagine piene e allineate
    margin: { top: MARGIN + HEADER_HN, right: MARGIN, bottom: MARGIN + FOOTER_H, left: MARGIN },
    rowPageBreak: 'avoid',        // mai spezzare una riga tra due pagine
    showHead: 'everyPage',        // intestazione colonne ripetuta su ogni pagina
    showFoot: 'lastPage',         // totali solo in fondo all'ultima pagina
    styles: {
      font: 'helvetica',
      fontSize: 7.5,
      cellPadding: { top: 1.8, bottom: 1.8, left: 1.5, right: 1.5 },
      textColor: PDF_COLORS.ink,
      lineColor: PDF_COLORS.rule,
      lineWidth: 0.15,
      overflow: 'linebreak',
      valign: 'middle',
    },
    headStyles: {
      fillColor: PDF_COLORS.petrolio,
      textColor: [255, 255, 255],
      fontStyle: 'bold',
      fontSize: 7.2,
      halign: 'left',
    },
    footStyles: {
      fillColor: PDF_COLORS.bgTot,
      textColor: PDF_COLORS.ink,
      fontStyle: 'bold',
      fontSize: 8,
    },
    alternateRowStyles: { fillColor: PDF_COLORS.bgAlt },
    didDrawPage: (data) => {
      drawHeader(data.pageNumber);
      drawFooter(data.pageNumber);
    },
  });

  // Sostituisco il segnaposto con il numero totale di pagine
  if (typeof doc.putTotalPages === 'function') doc.putTotalPages(totalPagesExp);

  const safe = s => String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
  const fname = `ekod_${safe(cfg.titolo)}_${safe(nomeCantiere)}_${todayISO()}.pdf`;
  doc.save(fname);
  toast('PDF esportato', 'success');
}
window.exportPDF = exportPDF;

    </div>
  `;
}

/* ---------- GANTT ---------- */
function renderGantt() {
  const c = state.cantiere;
  const view = state.ganttView || 'giornaliero';
  const isDaily = view === 'giornaliero';
  const isWeekly = view === 'settimanale';
  const isMonthly = view === 'mensile';
  // Larghezza cella per vista
  const cellWidth = isDaily ? 44 : (isWeekly ? 72 : 100);
  // Larghezza colonna laterale attività: stretta su mobile per dare spazio al calendario
  const vw = (typeof window !== 'undefined' && window.innerWidth) ? window.innerWidth : 1200;
  const SIDE_WIDTH = vw <= 480 ? 120 : (vw <= 820 ? 150 : 360);

  // --- Calcolo data inizio Gantt ---
  let startISO = c.anagrafica.data_inizio;
  if (!startISO) {
    const dates = c.attivita.map(a => a.inizio).filter(Boolean).sort();
    startISO = dates[0] || todayISO();
  }
  let ganttStart = new Date(startISO);
  if (isMonthly) {
    ganttStart = new Date(ganttStart.getFullYear(), ganttStart.getMonth(), 1);
  } else if (isWeekly) {
    const dow = ganttStart.getDay();
    const offset = dow === 0 ? -6 : (1 - dow);
    ganttStart.setDate(ganttStart.getDate() + offset);
  }
  ganttStart.setHours(0, 0, 0, 0);

  // --- Calcolo data fine Gantt: priorità a data_fine anagrafica, fallback all'attività più lontana ---
  let endISO = c.anagrafica.data_fine;
  if (!endISO) {
    const fineDates = c.attivita.map(a => a.fine).filter(Boolean).sort();
    endISO = fineDates.length ? fineDates[fineDates.length - 1] : null;
  }
  let ganttEnd;
  if (endISO) {
    ganttEnd = new Date(endISO);
    ganttEnd.setHours(0, 0, 0, 0);
    // Aggiungo un margine per leggibilità: 7 giorni / 2 settimane / 1 mese in più
    if (isDaily) ganttEnd.setDate(ganttEnd.getDate() + 7);
    else if (isWeekly) ganttEnd.setDate(ganttEnd.getDate() + 14);
    else ganttEnd = new Date(ganttEnd.getFullYear(), ganttEnd.getMonth() + 1, 1);
  } else {
    // Fallback: nessuna data fine disponibile → uso un default ragionevole
    ganttEnd = new Date(ganttStart);
    if (isDaily) ganttEnd.setDate(ganttEnd.getDate() + 42);
    else if (isWeekly) ganttEnd.setDate(ganttEnd.getDate() + 26 * 7);
    else ganttEnd = new Date(ganttStart.getFullYear(), ganttStart.getMonth() + 18, 1);
  }

  // Calcolo numero celle in base a inizio + fine, con limiti minimi e massimi
  let nCells;
  if (isDaily) {
    const days = Math.ceil((ganttEnd - ganttStart) / (1000 * 60 * 60 * 24));
    nCells = Math.min(Math.max(days, 21), 730);     // min 3 settimane, max 2 anni in giornaliero
  } else if (isWeekly) {
    const days = Math.ceil((ganttEnd - ganttStart) / (1000 * 60 * 60 * 24));
    nCells = Math.min(Math.max(Math.ceil(days / 7), 13), 156);  // min 13 settimane, max 3 anni
  } else {
    const months = (ganttEnd.getFullYear() - ganttStart.getFullYear()) * 12
                 + (ganttEnd.getMonth() - ganttStart.getMonth());
    nCells = Math.min(Math.max(months, 6), 60);     // min 6 mesi, max 5 anni
  }
  const trackWidth = nCells * cellWidth;

  const boundaries = [];
  if (isDaily) {
    for (let i = 0; i <= nCells; i++) {
      const d = new Date(ganttStart);
      d.setDate(d.getDate() + i);
      boundaries.push(d);
    }
  } else if (isWeekly) {
    for (let i = 0; i <= nCells; i++) {
      const d = new Date(ganttStart);
      d.setDate(d.getDate() + i * 7);
      boundaries.push(d);
    }
  } else {
    for (let i = 0; i <= nCells; i++) {
      const d = new Date(ganttStart.getFullYear(), ganttStart.getMonth() + i, 1);
      boundaries.push(d);
    }
  }
  function dateToPx(date) {
    if (date <= boundaries[0]) return 0;
    if (date >= boundaries[nCells]) return trackWidth;
    for (let i = 0; i < nCells; i++) {
      const s = boundaries[i], e = boundaries[i+1];
      if (date >= s && date < e) {
        const span = e - s; const offset = date - s;
        return i * cellWidth + (offset / span) * cellWidth;
      }
    }
    return trackWidth;
  }

  const monthsShort = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const daysShort = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const today = new Date(); today.setHours(0,0,0,0);
  let headerCells = '';
  for (let i = 0; i < nCells; i++) {
    const s = boundaries[i], e = boundaries[i+1];
    const isToday = today.getTime() === s.getTime() || (today >= s && today < e);
    if (isDaily) {
      const dow = s.getDay();
      const isWeekend = dow === 0 || dow === 6;
      const z = n => String(n).padStart(2,'0');
      // Marker mese: prima cella del mese o prima cella in assoluto
      const isMonthStart = s.getDate() === 1 || i === 0;
      const monthLabel = isMonthStart ? `<div class="day-month-marker">${monthsShort[s.getMonth()]}</div>` : '';
      headerCells += `<div class="gantt-time-cell day-cell ${isToday?'today':''} ${isWeekend?'weekend':''}" style="width:${cellWidth}px;">
        ${monthLabel}
        <div class="label-top">${z(s.getDate())}</div>
        <div class="label-bottom">${daysShort[dow]}</div>
      </div>`;
    } else if (isWeekly) {
      const z = n => String(n).padStart(2,'0');
      headerCells += `<div class="gantt-time-cell ${isToday?'today':''}" style="width:${cellWidth}px;">
        <div class="label-top">S${i+1}</div><div class="label-bottom">${z(s.getDate())}/${z(s.getMonth()+1)}</div></div>`;
    } else {
      headerCells += `<div class="gantt-time-cell ${isToday?'today':''}" style="width:${cellWidth}px;">
        <div class="label-top">${monthsShort[s.getMonth()]}</div><div class="label-bottom">${String(s.getFullYear()).slice(2)}</div></div>`;
    }
  }

  // Background tracks per evidenziare weekend nella vista giornaliera
  let weekendOverlayHTML = '';
  if (isDaily) {
    for (let i = 0; i < nCells; i++) {
      const dow = boundaries[i].getDay();
      if (dow === 0 || dow === 6) {
        weekendOverlayHTML += `<div class="gantt-weekend-col" style="left:${i*cellWidth}px; width:${cellWidth}px;"></div>`;
      }
    }
  }

  let todayLineHTML = '';
  if (today >= boundaries[0] && today < boundaries[nCells]) {
    const px = dateToPx(today);
    todayLineHTML = `<div class="gantt-today-line" style="left:${px}px;"></div>`;
  }

  const hasAtt = c.attivita.length > 0;
  let rowsHTML = '';
  if (!hasAtt) {
    rowsHTML = `<div class="gantt-empty"><div class="icn">${I.calendar}</div>Nessuna attività inserita.${state.isStudio ? ` <a onclick="app.setTab('attivita')" style="color:var(--ottone); font-weight:600; cursor:pointer;">Vai alle attività ›</a>` : ''}</div>`;
  } else {
    rowsHTML = c.attivita.map((a, idx) => {
      let barHTML = '';
      if (a.inizio && a.fine) {
        const start = new Date(a.inizio);
        const end = new Date(a.fine); end.setDate(end.getDate() + 1);
        const left = dateToPx(start); const right = dateToPx(end);
        const w = Math.max(8, right - left);
        const statusClass = (a.stato || '').toLowerCase().replace(/[\s']/g,'-')
          .replace('completata','done').replace('in-corso','progress').replace('in-ritardo','late')
          .replace('sospesa','paused').replace('da-iniziare','todo');
        const nomeAtt = escapeHtml(a.nome) || ('Attività ' + (idx+1));
        // Stima se il testo ci sta dentro la barra: ~6.5px per carattere + 16px padding
        const testoApprox = (a.nome || ('Attività ' + (idx+1))).length * 6.5 + 16;
        const ciSta = w >= testoApprox;
        const titleAttr = `${escapeHtml(a.nome)} · ${fmtDate(a.inizio)} → ${fmtDate(a.fine)}`;
        if (ciSta) {
          // Testo dentro la barra
          barHTML = `<div class="gantt-bar ${statusClass}" style="left:${left}px; width:${w}px;" title="${titleAttr}">${nomeAtt}</div>`;
        } else {
          // Barra senza testo + etichetta esterna che sporge a destra
          barHTML = `<div class="gantt-bar ${statusClass} no-label" style="left:${left}px; width:${w}px;" title="${titleAttr}"></div>
            <div class="gantt-bar-label" style="left:${left + w + 6}px;" title="${titleAttr}">${nomeAtt}</div>`;
        }
      }
      return `<div class="gantt-side-cell"><span class="num">${String(idx+1).padStart(2,'0')}</span><span class="name">${escapeHtml(a.nome) || '<span style="color:var(--ink-faint); font-style:italic;">Senza nome</span>'}</span></div>
        <div class="gantt-row-track ${isDaily?'daily':''}" style="--cell-width:${cellWidth}px; width:${trackWidth}px;">${weekendOverlayHTML}${barHTML}</div>`;
    }).join('');
  }

  return `
    <div class="gantt-controls">
      <div class="view-toggle">
        <button class="${isDaily?'active':''}" onclick="app.setGanttView('giornaliero')">Giornaliero</button>
        <button class="${isWeekly?'active':''}" onclick="app.setGanttView('settimanale')">Settimanale</button>
        <button class="${isMonthly?'active':''}" onclick="app.setGanttView('mensile')">Mensile</button>
      </div>
      <div class="gantt-meta">
        <span class="legend-item"><span class="legend-bar" style="background:var(--st-todo);"></span>Da iniziare</span>
        <span class="legend-item"><span class="legend-bar" style="background:var(--st-progress);"></span>In corso</span>
        <span class="legend-item"><span class="legend-bar" style="background:var(--st-done);"></span>Completata</span>
        <span class="legend-item"><span class="legend-bar" style="background:var(--st-late);"></span>In ritardo</span>
        <span class="legend-item"><span class="legend-bar" style="background:var(--st-paused);"></span>Sospesa</span>
      </div>
    </div>
    <div class="gantt">
      ${hasAtt ? `<div class="gantt-scroll"><div class="gantt-grid" style="grid-template-columns: ${SIDE_WIDTH}px ${trackWidth}px;">
        <div class="gantt-side-header">Attività</div>
        <div class="gantt-time-header ${isDaily?'daily':''}" style="width:${trackWidth}px;">${headerCells}${todayLineHTML}</div>
        ${rowsHTML}
      </div></div>` : rowsHTML}
    </div>
  `;
}

function renderDiario() {
  const c = state.cantiere;
  if (!c) return '';
  const studio = state.isStudio;
  const entries = (c.diario || []).slice().sort((a, b) =>
    (b.data || '').localeCompare(a.data || '') || (b.created_at || '').localeCompare(a.created_at || ''));

  const composer = studio ? `
    <div class="diario-composer">
      <div class="dc-head">${I.book} Pubblica un aggiornamento</div>
      <div class="dc-row">
        <input type="date" id="diario-data" class="dc-date" value="${todayISO()}">
        <input type="text" id="diario-titolo" class="dc-titolo" placeholder="Titolo breve — es. Posa pavimento zona giorno">
      </div>
      <textarea id="diario-testo" class="dc-testo" rows="3" placeholder="Racconta cosa è stato fatto oggi in cantiere…"></textarea>
      <div id="diario-foto-preview" class="dc-preview"></div>
      <div class="dc-actions">
        <button class="btn btn-ghost" onclick="document.getElementById('diario-foto-input').click()">${I.upload} Aggiungi foto</button>
        <input type="file" id="diario-foto-input" accept="image/*" multiple style="display:none" onchange="app.diarioSelezionaFoto(this.files); this.value='';">
        <button class="btn btn-primary" id="diario-pubblica" onclick="app.addDiarioEntry()">Pubblica aggiornamento</button>
      </div>
    </div>
  ` : '';

  // Banner attivazione notifiche push (solo committente, solo se supportate)
  const pushBanner = (!studio && state._pushSupportato !== false) ? `
    <div class="push-banner ${state._pushAttivo ? 'on' : ''}">
      <span class="pb-ic">${state._pushAttivo ? I.check : I.book}</span>
      <span class="pb-txt">${state._pushAttivo
        ? 'Notifiche attive — ti avviseremo a ogni nuovo aggiornamento del cantiere.'
        : 'Vuoi un avviso quando lo studio pubblica un aggiornamento? Attiva le notifiche.'}</span>
      ${state._pushAttivo
        ? `<button class="pb-link" onclick="app.disattivaPush()">Disattiva</button>`
        : `<button class="btn btn-primary pb-btn" onclick="app.attivaPush()">Attiva notifiche</button>`}
    </div>` : '';

  if (!entries.length) {
    return `
      ${composer}
      ${pushBanner}
      <div class="docs-empty">
        <div class="icn-big">${I.book}</div>
        <div style="font-family:var(--font-serif); font-size:18px; color:var(--ink); margin-bottom:4px;">Il diario è ancora vuoto</div>
        <div>${studio
          ? 'Pubblica il primo aggiornamento: una foto e due righe bastano a tenere informato il committente.'
          : 'Lo studio non ha ancora pubblicato aggiornamenti per questo cantiere.'}</div>
      </div>
    `;
  }

  const MESI = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  const timeline = entries.map(e => {
    const foto = Array.isArray(e.foto) ? e.foto : [];
    const fotoHTML = foto.length ? `
      <div class="diario-foto${foto.length === 1 ? ' single' : ''}">
        ${foto.map((f, i) => `
          <button class="df-thumb" onclick="app.apriDiarioFoto('${e.id}', ${i})" title="Ingrandisci">
            <img class="doc-thumb-img" data-thumb-path="${escapeHtml(f.path)}" alt="">
            <span class="doc-thumb-ph">${I.book}</span>
          </button>`).join('')}
      </div>` : '';
    const d = new Date((e.data || todayISO()) + 'T00:00:00');
    const giorno = isNaN(d) ? '' : d.getDate();
    const mese = isNaN(d) ? '' : (MESI[d.getMonth()] || '');
    const anno = isNaN(d) ? '' : d.getFullYear();
    return `
      <div class="diario-entry">
        <div class="de-date">
          <div class="de-day">${giorno}</div>
          <div class="de-mon">${mese}</div>
          <div class="de-yr">${anno}</div>
        </div>
        <div class="de-body">
          ${e.titolo ? `<div class="de-title">${escapeHtml(e.titolo)}</div>` : ''}
          ${e.testo ? `<div class="de-text">${escapeHtml(e.testo).replace(/\n/g, '<br>')}</div>` : ''}
          ${fotoHTML}
          <div class="de-foot">
            <span>${e.autore ? escapeHtml(e.autore) : 'Studio ekōD'}</span>
            ${studio ? `<button class="de-del" onclick="app.deleteDiarioEntry('${e.id}')" title="Elimina aggiornamento">${I.trash}</button>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');

  const haFoto = entries.some(e => Array.isArray(e.foto) && e.foto.length);
  if (haFoto) setTimeout(() => app.hydrateThumbnails(), 0);

  return `
    ${composer}
    ${pushBanner}
    <div class="diario-timeline">
      ${timeline}
    </div>
  `;
}

          ${studio && sel ? `

            <button class="btn-icon" title="Sostituisci con un nuovo PDF" onclick="document.getElementById('piantina-file-repl').click()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>

function renderNote() {
  const c = state.cantiere;
  const tipiOpts = state.liste.tipiNota || [];
  const statiOpts = state.liste.statiNote || [];
  const teamOpts = state.liste.team || [];
  const studio = state.isStudio;

  // Il cliente, come responsabile, può scegliere solo la voce dedicata al committente.
  // Riconosce sia "Cliente" sia "Committente" (case-insensitive). Lo studio vede tutto il team.
  const isVoceCliente = (v) => {
    const s = (v || '').trim().toLowerCase();
    return s === 'cliente' || s === 'committente';
  };
  const respOpts = studio
    ? teamOpts
    : teamOpts.filter(o => isVoceCliente(o.valore));

  // Il cliente, come tipo di nota, può scegliere solo "Nota". Lo studio vede tutti i tipi.
  const tipoOpts = studio
    ? tipiOpts
    : tipiOpts.filter(o => (o.valore || '').trim().toLowerCase() === 'nota');

  // Il cliente, come stato, può scegliere solo "Aperta". Lo studio vede tutti gli stati.
  const statoOpts = studio
    ? statiOpts
    : statiOpts.filter(o => (o.valore || '').trim().toLowerCase() === 'aperta');

  // Una nota la può modificare lo studio sempre, il cliente solo le proprie
  const canEdit = (n) => studio || (n.autore === state.user.email);

  // Contatti del cantiere (subappaltatori/fornitori, per il destinatario del ticket)
  const contattiList = (state.cantiere.contatti || []).filter(ct => ct.azienda || ct.referente);
  // Membri dello studio (recapiti fissi)
  const studioMembers = STUDIO_MEMBERS;
  // Risolve tipo/id effettivi di una nota (con retrocompatibilità col vecchio destinatario_contatto_id)
  const destTipoOf = (n) => n.destinatario_tipo || (n.destinatario_contatto_id ? 'sub' : '');
  const destIdOf = (n) => n.destinatario_id || n.destinatario_contatto_id || '';

  // Riepilogo: conteggio note per stato (mantiene l'ordine degli stati definiti nelle liste)
  const conteggioStati = (() => {
    const conta = {};
    (c.note || []).forEach(n => {
      const s = (n.stato || '').trim() || 'Senza stato';
      conta[s] = (conta[s] || 0) + 1;
    });
    // Ordino seguendo l'ordine delle liste, poi eventuali stati extra, "Senza stato" per ultimo
    const ordineListe = (state.liste.statiNote || []).map(o => o.valore);
    const chiavi = Object.keys(conta).sort((a, b) => {
      if (a === 'Senza stato') return 1;
      if (b === 'Senza stato') return -1;
      const ia = ordineListe.indexOf(a), ib = ordineListe.indexOf(b);
      if (ia === -1 && ib === -1) return a.localeCompare(b);
      if (ia === -1) return 1;
      if (ib === -1) return -1;
      return ia - ib;
    });
    return chiavi.map(s => ({ stato: s, n: conta[s] }));
  })();

  return `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
      <div style="font-family:var(--font-serif); font-weight:500; font-size:24px;">Note e criticità</div>
      <button class="btn btn-ghost" onclick="app.addRow('note')">${I.plus} Aggiungi nota</button>
    </div>
    ${renderPiantinePanel()}
    ${c.note.length === 0 ? `
      <div class="empty-state">
        <div class="icn">${I.notes}</div>
        <div class="title">Nessuna nota</div>
        <button class="btn btn-primary" onclick="app.addRow('note')">${I.plus} Aggiungi la prima</button>
      </div>
    ` : `
      <div class="note-riepilogo">
        <div class="note-riepilogo-tot">
          <span class="nr-num">${c.note.length}</span>
          <span class="nr-lbl">${c.note.length === 1 ? 'nota' : 'note'} in totale</span>
        </div>
        <div class="note-riepilogo-stati">
          ${conteggioStati.map(({stato, n}) => `
            <span class="pill ${stato === 'Senza stato' ? 'nostate' : pillClass(stato)} nr-pill">
              ${escapeHtml(stato)}
              <span class="nr-count">${n}</span>
            </span>`).join('')}
        </div>
      </div>
      <table class="note-stati-table">
        <thead>
          <tr><th>Stato</th><th class="num">Note</th><th class="num">%</th><th class="bar-col">Distribuzione</th></tr>
        </thead>
        <tbody>
          ${conteggioStati.map(({stato, n}) => {
            const perc = c.note.length ? Math.round((n / c.note.length) * 100) : 0;
            const cls = stato === 'Senza stato' ? 'nostate' : pillClass(stato);
            return `
            <tr>
              <td><span class="stato-dot pill ${cls}"></span>${escapeHtml(stato)}</td>
              <td class="num">${n}</td>
              <td class="num">${perc}%</td>
              <td class="bar-col"><span class="stato-bar-track"><span class="stato-bar-fill pill ${cls}" style="width:${perc}%"></span></span></td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr><td>Totale</td><td class="num">${c.note.length}</td><td class="num">100%</td><td class="bar-col"></td></tr>
        </tfoot>
      </table>
      <div class="note-grid">
        ${[...c.note].sort((a, b) => {
          // Ordino per data della nota (desc); a parità, per created_at (desc)
          const da = a.data || '';
          const db = b.data || '';
          if (da !== db) return db.localeCompare(da);
          const ca = a.created_at || '';
          const cb = b.created_at || '';
          return cb.localeCompare(ca);
        }).map(n => {
          const editable = canEdit(n);
          const ro = !editable ? 'readonly disabled' : '';
          // Una nota è "del cliente" se l'autore non è dello studio (email non @ekod.eu)
          const daCliente = n.autore && !n.autore.toLowerCase().endsWith('@ekod.eu');
          return `
          <div class="note-card${daCliente ? ' nota-cliente' : ''}" id="nota-card-${n.id}"
               onmouseenter="app.evidenziaPin('${n.id}', true)" onmouseleave="app.evidenziaPin('${n.id}', false)">
            <div class="note-head">
              ${n.numero ? `<span class="nota-num${n.pin_x != null ? ' linked' : ''}" title="${n.pin_x != null ? 'Mostra il flag sulla piantina' : 'Numero della nota'}" ${n.pin_x != null ? `onclick="app.vaiAlPin('${n.id}')"` : ''}>${n.numero}</span>` : ''}
              ${daCliente && studio ? `<span class="nota-badge-cliente">Dal cliente</span>` : ''}
              <input type="date" value="${escapeHtml(n.data || '')}" ${ro} style="font-family:var(--font-mono); font-size:11px; padding:4px 6px;" onchange="app.setRow('note','${n.id}','data',this.value)">
              <select class="cell-select" ${ro} style="max-width:170px;" onchange="app.setRow('note','${n.id}','tipo',this.value)">
                <option value="">— Tipo —</option>
                ${tipoOpts.map(o => `<option value="${escapeHtml(o.valore)}" ${n.tipo===o.valore?'selected':''}>${escapeHtml(o.valore)}</option>`).join('')}
              </select>
            </div>
            <textarea ${ro} placeholder="Descrivi…" onchange="app.setRow('note','${n.id}','descrizione',this.value)">${escapeHtml(n.descrizione || '')}</textarea>
            <div class="note-foot">
              <div class="foot-selects">
                <select class="cell-select" ${ro} onchange="app.setRow('note','${n.id}','responsabile',this.value)">
                  <option value="">— Resp. —</option>
                  ${respOpts.map(o => `<option value="${escapeHtml(o.valore)}" ${n.responsabile===o.valore?'selected':''}>${escapeHtml(o.valore)}</option>`).join('')}
                </select>
                <select class="cell-select" ${ro} onchange="app.setRow('note','${n.id}','stato',this.value)">
                  <option value="">— Stato —</option>
                  ${statoOpts.map(o => `<option value="${escapeHtml(o.valore)}" ${n.stato===o.valore?'selected':''}>${escapeHtml(o.valore)}</option>`).join('')}
                </select>
                ${studio ? (() => {
                  const dTipo = destTipoOf(n);
                  const dId = destIdOf(n);
                  // Menu 1: categoria del destinatario
                  let html = `
                <select class="cell-select dest-tipo" onchange="app.setNotaDestTipo('${n.id}',this.value)" title="A chi inviare">
                  <option value="">— Invia a… —</option>
                  <option value="studio" ${dTipo==='studio'?'selected':''}>Studio</option>
                  <option value="sub" ${dTipo==='sub'?'selected':''}>Subappaltatore / Fornitore</option>
                  <option value="cliente" ${dTipo==='cliente'?'selected':''}>Cliente</option>
                </select>`;
                  // Menu 2: persona (solo per studio e sub)
                  if (dTipo === 'studio') {
                    html += `
                <select class="cell-select dest-pers" onchange="app.setNotaDestId('${n.id}',this.value)" title="Quale membro dello studio">
                  <option value="">— Chi… —</option>
                  ${studioMembers.map(m => `<option value="${m.key}" ${dId===m.key?'selected':''}>${escapeHtml(m.nome)}</option>`).join('')}
                </select>`;
                  } else if (dTipo === 'sub') {
                    html += `
                <select class="cell-select dest-pers" onchange="app.setNotaDestId('${n.id}',this.value)" title="Quale contatto">
                  <option value="">— Chi… —</option>
                  ${contattiList.map(ct => `<option value="${ct.id}" ${dId===ct.id?'selected':''}>${escapeHtml(ct.azienda || ct.referente)}${ct.referente && ct.azienda ? ' · '+escapeHtml(ct.referente) : ''}</option>`).join('')}
                </select>`;
                  }
                  return html;
                })() : ''}
              </div>
              <div class="foot-actions">
                ${editable ? `<button class="btn-icon pin-btn${n.pin_x != null ? ' has-pin' : ''}" title="${n.pin_x != null ? 'Riposiziona il flag sulla piantina' : 'Posiziona il flag sulla piantina'}" onclick="app.avviaPosizionamentoPin('${n.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></button>` : ''}
                ${editable && n.pin_x != null ? `<button class="btn-icon" title="Rimuovi il flag dalla piantina" onclick="app.rimuoviPin('${n.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><line x1="4" y1="4" x2="20" y2="20"/></svg></button>` : ''}
                ${(() => {
                  if (!studio) return '';
                  const dTipo = destTipoOf(n);
                  const dId = destIdOf(n);
                  // Studio o Subappaltatore con persona selezionata: WhatsApp + email
                  if ((dTipo === 'studio' || dTipo === 'sub') && dId) {
                    return `<button class="btn-icon whatsapp" title="Invia via WhatsApp" onclick="app.inviaTicketWhatsapp('${n.id}')">${I.whatsapp}</button>`
                      + `<button class="btn-icon ticket-mail" title="Invia via email" onclick="app.inviaTicketEmail('${n.id}')">${I.mail}</button>`;
                  }

                })()}
                ${studio ? `<button class="btn-icon danger" title="Elimina nota" onclick="app.delRow('note','${n.id}')">${I.trash}</button>` : ''}

/* ---------- DOCUMENTI ---------- */
function fmtBytes(b) {
  const n = parseInt(b) || 0;
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  if (n < 1024 * 1024 * 1024) return (n / (1024 * 1024)).toFixed(1) + ' MB';
  return (n / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
}

function isImmagine(d) {
  if (!d) return false;
  if (d.mime_type && d.mime_type.toLowerCase().startsWith('image/')) return true;
  const n = (d.nome_file || '').toLowerCase();
  return /\.(jpe?g|png|gif|webp|bmp|heic|heif|avif|svg)$/.test(n);
}

function docRowHTML(d, studio) {
  const img = isImmagine(d);
  const apri = img ? `app.apriLightbox('${d.id}')` : `app.downloadDocumento('${d.id}')`;
  const leading = img
    ? `<button class="doc-thumb" onclick="app.apriLightbox('${d.id}')" title="Anteprima">
         <img class="doc-thumb-img" data-thumb-id="${d.id}" alt="">
         <span class="doc-thumb-ph">${I.file}</span>
       </button>`
    : `<div class="doc-icn">${I.file}</div>`;
  return `
    <div class="doc-row${img ? ' is-image' : ''}">
      ${leading}
      <div class="doc-info">
        <button class="doc-name" onclick="${apri}" title="${img ? 'Anteprima' : 'Apri / scarica'}">${escapeHtml(d.nome_file)}</button>
        <div class="doc-meta">Caricato da ${escapeHtml(d.caricato_da || '—')}</div>
      </div>
      <div class="doc-size">${fmtBytes(d.dimensione_bytes)}</div>
      <div class="doc-date">${fmtDate(d.created_at ? d.created_at.slice(0,10) : '')}</div>
      ${studio
        ? `<button class="btn-icon danger" onclick="app.deleteDocumento('${d.id}')" title="Elimina">${I.trash}</button>`
        : `<button class="btn-icon" onclick="${apri}" title="${img ? 'Anteprima' : 'Apri'}">${img ? I.search : I.external}</button>`}
    </div>`;
}

function renderDocumenti() {
  const c = state.cantiere;
  if (!c) return '';
  const docs = c.documenti || [];
  const studio = state.isStudio;
  const cartellaAperta = state.cartellaAperta || null;

  // Cartelle = unione di {documenti.cartella se non vuoto} + state.cartelleVuote
  const cartelleSet = new Set();
  for (const d of docs) {
    if (d.cartella && d.cartella.trim()) cartelleSet.add(d.cartella);
  }
  if (state.cartelleVuote) {
    for (const cv of state.cartelleVuote) cartelleSet.add(cv);
  }
  const cartelle = [...cartelleSet].sort((a, b) => a.localeCompare(b, 'it'));

  // Documenti da mostrare nel pannello principale
  let docsVisibili;
  if (cartellaAperta) {
    docsVisibili = docs.filter(d => d.cartella === cartellaAperta);
  } else {
    // Vista root: mostra solo i documenti SENZA cartella
    docsVisibili = docs.filter(d => !d.cartella || !d.cartella.trim());
  }

  // Galleria immagini visibili (per lightbox + idratazione thumbnail)
  state._galleria = docsVisibili.filter(isImmagine).map(d => d.id);
  if (state._galleria.length) setTimeout(() => app.hydrateThumbnails(), 0);

  // Dropzone HTML — l'input file è nascosto e attivato dal click sulla zona
  const dropzoneHTML = studio ? `
    <div class="upload-dropzone" id="upload-dropzone"
         ondragover="event.preventDefault(); this.classList.add('dragover');"
         ondragleave="this.classList.remove('dragover');"
         ondrop="event.preventDefault(); this.classList.remove('dragover'); app.uploadDocumenti(event.dataTransfer.files, '${escapeHtml(cartellaAperta || '')}');"
         onclick="document.getElementById('doc-file-input').click();">
      <div class="icn">${I.upload || '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'}</div>
      <div class="title">Carica documenti</div>
      <div class="hint">Trascina qui i file o clicca per selezionarli · ${cartellaAperta ? `Cartella: <strong>${escapeHtml(cartellaAperta)}</strong>` : 'Documenti generali del cantiere'} · max 50 MB per file</div>
    </div>
    <input type="file" id="doc-file-input" multiple style="display:none;"
           onchange="app.uploadDocumenti(this.files, '${escapeHtml(cartellaAperta || '')}'); this.value='';">
  ` : '';

  // Header breadcrumb / titolo
  const headerHTML = `
    <div class="docs-toolbar">
      <div class="docs-breadcrumb">
        ${cartellaAperta
          ? `<a onclick="app.chiudiCartella()">${I.folder} Documenti</a><span class="sep">›</span><span class="cur">${escapeHtml(cartellaAperta)}</span>`
          : `<span class="cur">${I.folder} Documenti del cantiere</span>`}
      </div>
      <div style="display:flex; gap:10px;">
        ${studio && !cartellaAperta ? `<button class="btn btn-ghost" onclick="app.creaCartella()">${I.folder} Nuova cartella</button>` : ''}
        ${studio && cartellaAperta ? `<button class="btn btn-danger-ghost" onclick="app.eliminaCartella('${escapeHtml(cartellaAperta).replace(/'/g, "\\'")}')">${I.trash} Elimina cartella</button>` : ''}
      </div>
    </div>
  `;

  // Vista root: cartelle in alto, file root sotto
  if (!cartellaAperta) {
    const foldersHTML = cartelle.length > 0 ? `
      <div style="font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:10px;">Cartelle</div>
      <div class="docs-folders">
        ${cartelle.map(nome => {
          const count = docs.filter(d => d.cartella === nome).length;
          return `
            <div class="docs-folder" onclick="app.apriCartella('${escapeHtml(nome).replace(/'/g, "\\'")}')">
              <div class="icn">${I.folder}</div>
              <div class="info">
                <div class="name">${escapeHtml(nome)}</div>
                <div class="count">${count} ${count === 1 ? 'documento' : 'documenti'}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    ` : '';

    const filesRootHTML = docsVisibili.length > 0 ? `
      <div style="font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:10px;">Documenti generali</div>
      <div class="docs-files">
        ${docsVisibili.map(d => docRowHTML(d, studio)).join('')}
      </div>
    ` : '';

    if (cartelle.length === 0 && docsVisibili.length === 0) {
      return `
        ${headerHTML}
        ${dropzoneHTML}
        <div class="docs-empty">
          <div class="icn-big">${I.folder}</div>
          <div style="font-family:var(--font-serif); font-size:18px; color:var(--ink); margin-bottom:4px;">Nessun documento caricato</div>
          <div>${studio ? 'Trascina file nella zona qui sopra o clicca su "Nuova cartella" per organizzare i documenti.' : 'Lo studio non ha ancora caricato documenti per questo cantiere.'}</div>
        </div>
      `;
    }

    return `
      ${headerHTML}
      ${dropzoneHTML}
      ${foldersHTML}
      ${filesRootHTML}
    `;
  }

  // Vista cartella aperta
  return `
    ${headerHTML}
    ${dropzoneHTML}
    ${docsVisibili.length === 0 ? `
      <div class="docs-empty">
        <div class="icn-big">${I.folderOpen}</div>
        <div style="font-family:var(--font-serif); font-size:18px; color:var(--ink); margin-bottom:4px;">Cartella vuota</div>
        <div>${studio ? 'Carica documenti trascinandoli nella zona qui sopra.' : 'Nessun documento in questa cartella.'}</div>
      </div>
    ` : `
      <div class="docs-files">
        ${docsVisibili.map(d => docRowHTML(d, studio)).join('')}
      </div>
    `}
  `;
}

// Caricamento async della lista accessi (dopo render della scheda)
async function loadAccessiList() {
  if (!state.cantiere) return;
  const cantiereId = state.cantiere.anagrafica.id;
  const { data, error } = await sb.from('accessi_cliente').select('*').eq('cantiere_id', cantiereId).order('created_at');
  if (error) { console.error(error); return; }
  const host = document.getElementById('accessi-list-host');
  if (!host) return;
  if (data.length === 0) {
    host.innerHTML = `<div style="font-size:13px; color:var(--ink-muted); padding:12px 0;">Nessun cliente ha ancora accesso a questo cantiere.</div>`;
    return;
  }
  host.innerHTML = `
    <div style="font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:10px;">Clienti con accesso</div>
    <div class="client-list">

      `).join('')}
    </div>
  `;
}

      body: `Questa è la scheda online del <strong>tuo cantiere</strong>. Qui puoi consultare in tempo reale lo stato dei lavori, i pagamenti e tutte le informazioni che lo studio ekōD aggiorna man mano.` },
    { title: "Cosa vedi",
      body: `Tutte le sezioni del cantiere: anagrafica, contatti dei fornitori, attività con avanzamento, ordini di forniture, costi tecnici e di costruzione, Cronoprogramma Gantt, pagamenti, note.` },
    { title: "Confermare un pagamento ricevuto",
      body: `Vai al tab <strong>Pagamenti</strong>. Per ogni voce puoi compilare i campi <strong>Incassato</strong>, <strong>Data incasso</strong> e <strong>Stato</strong> per segnare i pagamenti che hai effettuato. Gli altri dati sono predisposti dallo studio.` },
    { title: "Aggiungere note o richieste",
      body: `Vai al tab <strong>Note</strong>. Puoi aggiungere note tue (varianti richieste, decisioni, criticità). Lo studio le vede in tempo reale e può rispondere.` },
    { title: "Consultare i documenti",
      body: `Tab <strong>Documenti</strong>: troverai tutti i file caricati dallo studio (permessi, tavole, contratti, foto cantiere). Clicca sul nome per aprire o scaricare. I documenti possono essere organizzati in cartelle: clicca su una cartella per esplorarla, clicca su <strong>Documenti</strong> nel breadcrumb per tornare indietro.` },
    { title: "Cronoprogramma",
      body: `Il tab <strong>Cronoprogramma</strong> mostra il calendario dei lavori con il Gantt e l'andamento delle singole attività. Puoi scegliere tra <strong>vista giornaliera</strong> (per il dettaglio quotidiano), <strong>settimanale</strong> o <strong>mensile</strong> a seconda di quanto vuoi zoomare.` },
    { title: "Contatti studio",
      body: `Per qualsiasi domanda puoi contattare lo studio:<br><br>
      <strong>CEO Andrea Ghirardello</strong><br>
      a.ghirardello@ekod.eu · +39 329 943 5075<br><br>
      <strong>Arch. Letizia Di Lullo</strong><br>
      l.dilullo@ekod.eu · +39 347 065 5250<br><br>
      <strong>Arch. Giulia Salvatori</strong><br>
      ufficiotecnico@ekod.eu · +39 349 521 3977` },
  ];

  return `
    <div class="page-header">
      <div class="page-title">Istruzioni <em>per l'uso</em></div>
      <div class="page-subtitle">${studio ? "Guida rapida all'utilizzo dell'applicazione online." : "Come usare la scheda online del tuo cantiere."}</div>
    </div>
    <div class="istruzioni-intro">
      <strong>Benvenuto.</strong> ${studio ? "L'app online ti permette di gestire i cantieri e condividerli con i committenti in tempo reale." : "Hai accesso alla scheda online del tuo cantiere, aggiornata in tempo reale dallo studio ekōD."}
    </div>
    ${sezioni.map((s, i) => `
      <div class="istruzione-card">
        <div class="num">${String(i+1).padStart(2,'0')}</div>
        <div class="body">
          <h4>${escapeHtml(s.title)}</h4>
          <div>${s.body}</div>
        </div>
      </div>
    `).join('')}
  `;
}

init();

<!-- PWA: registrazione service worker + gestione aggiornamenti -->
<script>
(function() {
  if (!('serviceWorker' in navigator)) return;

  let updateBanner = null;
  let waitingRegistration = null;

  function showUpdateBanner(reg) {
    if (updateBanner) return; // già mostrato
    waitingRegistration = reg;

    const banner = document.createElement('div');
    banner.id = 'pwa-update-banner';
    banner.innerHTML = `
      <div class="pwa-banner-inner">
        <div class="pwa-banner-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </div>
        <div class="pwa-banner-text">
          <div class="pwa-banner-title">Nuova versione disponibile</div>
          <div class="pwa-banner-sub">Aggiorna per le ultime novità.</div>
        </div>
        <button class="pwa-banner-btn" id="pwa-update-btn">Aggiorna</button>
        <button class="pwa-banner-close" id="pwa-banner-close" title="Chiudi">×</button>
      </div>
    `;
    document.body.appendChild(banner);
    updateBanner = banner;

    document.getElementById('pwa-update-btn').addEventListener('click', () => {
      if (waitingRegistration && waitingRegistration.waiting) {
        waitingRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
    });
    document.getElementById('pwa-banner-close').addEventListener('click', () => {
      banner.classList.add('hide');
      setTimeout(() => banner.remove(), 300);
      updateBanner = null;
    });

    // Animazione di entrata
    requestAnimationFrame(() => banner.classList.add('show'));
  }

  function injectBannerStyles() {
    if (document.getElementById('pwa-banner-styles')) return;
    const css = `
      #pwa-update-banner {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 99999;
        max-width: 420px;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity .25s ease, transform .25s ease;
        pointer-events: none;
      }
      #pwa-update-banner.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
      #pwa-update-banner.hide { opacity: 0; transform: translateY(20px); }
      #pwa-update-banner .pwa-banner-inner {
        display: flex;
        align-items: center;
        gap: 14px;
        background: #1F3A45;
        color: #F5EFDF;
        border-radius: 12px;
        padding: 14px 18px;
        box-shadow: 0 12px 32px rgba(28,24,18,0.20), 0 4px 12px rgba(28,24,18,0.12);
        font-family: Manrope, system-ui, sans-serif;
      }
      #pwa-update-banner .pwa-banner-icon {
        background: rgba(168,133,74,0.22);
        color: #D4B07A;
        width: 38px; height: 38px;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      #pwa-update-banner .pwa-banner-text { flex: 1; min-width: 0; }
      #pwa-update-banner .pwa-banner-title {
        font-weight: 600;
        font-size: 13px;
        color: #F5EFDF;
        line-height: 1.3;
      }
      #pwa-update-banner .pwa-banner-sub {
        font-size: 11px;
        color: rgba(245,239,223,0.66);
        line-height: 1.3;
        margin-top: 2px;
      }
      #pwa-update-banner .pwa-banner-btn {
        background: #A8854A;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        transition: background .15s ease;
      }
      #pwa-update-banner .pwa-banner-btn:hover { background: #C29A5C; }
      #pwa-update-banner .pwa-banner-close {
        background: transparent;
        color: rgba(245,239,223,0.5);
        border: none;
        width: 26px; height: 26px;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        border-radius: 5px;
        transition: all .15s ease;
        flex-shrink: 0;
        font-family: inherit;
      }
      #pwa-update-banner .pwa-banner-close:hover { color: #F5EFDF; background: rgba(255,255,255,0.08); }
      @media (max-width: 600px) {
        #pwa-update-banner { left: 12px; right: 12px; bottom: 12px; max-width: none; }
      }
    `;
    const style = document.createElement('style');
    style.id = 'pwa-banner-styles';
    style.textContent = css;
    document.head.appendChild(style);
  }

  window.addEventListener('load', () => {
    Promise.reject(new Error('demo: SW disattivato'))
      .then((reg) => {
        console.log('[PWA] Service worker registrato:', reg.scope);

        injectBannerStyles();

        // Caso 1: c'è già un service worker in attesa (aggiornamento pronto da prima)
        if (reg.waiting) {
          showUpdateBanner(reg);
        }

        // Caso 2: arriva un nuovo service worker mentre l'app è aperta
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          if (!newSW) return;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              // È pronto e c'è una vecchia versione che gira → mostro banner
              showUpdateBanner(reg);
            }
          });
        });

        // Polling: controllo nuove versioni ogni 15 minuti
        setInterval(() => reg.update().catch(() => {}), 15 * 60 * 1000);

        // Quando l'utente cambia tab/torna sulla finestra, controllo subito
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden) reg.update().catch(() => {});
        });
      })
      .catch((err) => console.warn('[PWA] Registrazione fallita:', err));

    // Quando il nuovo SW prende il controllo → ricarico la pagina
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  });
})();
</script>
