async function _initOriginale_DISATTIVATO() {
  // Recupera sessione esistente (se l'utente era già loggato)
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user) {
    state.user = {
      id: session.user.id,
      email: session.user.email,
      isStudio: isStudioEmail(session.user.email),
    };
    state.isStudio = state.user.isStudio;
    document.getElementById('splash').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-root').style.display = '';
    await caricaListe();
    await caricaCantieri();
    // Se il cliente ha un solo cantiere, aprilo automaticamente
    if (!state.isStudio && state.cantieri.length === 1) {
      state.cantiereId = state.cantieri[0].id;
      state.view = 'cantiere';
      await caricaCantiere(state.cantiereId);
    }
    render();
    if (state.user && !state.isStudio) app.controllaPush();
  } else {
    // Mostra schermata login
    document.getElementById('splash').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-root').style.display = 'none';
    renderAuth();
  }

  // Ascolto cambi di sessione (logout da altra tab, scadenza token, ecc.)
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT' || !session) {
      state.user = null;
      state.isStudio = false;
      state.cantieri = [];
      state.cantiere = null;
      document.getElementById('app-root').style.display = 'none';
      document.getElementById('auth-screen').style.display = 'flex';
      renderAuth();
    }
  });
}

async function doLogin(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw error;
  state.user = {
    id: data.user.id,
    email: data.user.email,
    isStudio: isStudioEmail(data.user.email),
  };
  state.isStudio = state.user.isStudio;

  // Carico dati
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-root').style.display = '';
  await caricaListe();
  await caricaCantieri();
  state.view = 'dashboard';
  if (!state.isStudio && state.cantieri.length === 1) {
    state.cantiereId = state.cantieri[0].id;
    state.view = 'cantiere';
    await caricaCantiere(state.cantiereId);
  }
  render();
  if (state.user && !state.isStudio) app.controllaPush();
}

async function doLogout() {
  await sb.auth.signOut();
  // onAuthStateChange si occupa del resto
}

/* ============================================================
   CARICAMENTO DATI DA SUPABASE
   ============================================================ */
async function caricaListe() {
  const { data, error } = await sb.from('liste').select('*').order('ord');
  if (error) { console.error('Errore carica liste:', error); toast('Errore caricamento liste', 'error'); return; }
  state.liste = {};
  for (const row of data) {
    if (!state.liste[row.lista_key]) state.liste[row.lista_key] = [];
    state.liste[row.lista_key].push({ id: row.id, valore: row.valore, ord: row.ord });
  }
}

async function caricaCantieri() {
  // Per la dashboard mi serve riepilogo: anagrafica + totali calcolati
  const { data, error } = await sb.from('cantieri').select('*').order('created_at', { ascending: false });
  if (error) { console.error('Errore carica cantieri:', error); toast('Errore caricamento cantieri', 'error'); return; }
  state.cantieri = data;
}

async function caricaCantiere(id) {
  state.loading = true;
  const [anag, contatti, attivita, forniture, tec, costr, pag, note, docs, accessi, diario, piantine] = await Promise.all([
    sb.from('cantieri').select('*').eq('id', id).single(),
    sb.from('contatti').select('*').eq('cantiere_id', id).order('ord'),
    sb.from('attivita').select('*').eq('cantiere_id', id).order('ord'),
    sb.from('forniture').select('*').eq('cantiere_id', id).order('ord'),
    sb.from('costi_tecnici').select('*').eq('cantiere_id', id).order('ord'),
    sb.from('costi_costruzione').select('*').eq('cantiere_id', id).order('ord'),
    sb.from('pagamenti').select('*').eq('cantiere_id', id).order('ord'),
    sb.from('note').select('*').eq('cantiere_id', id).order('created_at', { ascending: false }),
    sb.from('documenti').select('*').eq('cantiere_id', id).order('created_at', { ascending: false }),
    sb.from('accessi_cliente').select('*').eq('cantiere_id', id),
    sb.from('diario').select('*').eq('cantiere_id', id).order('data', { ascending: false }),
    sb.from('piantine').select('*').eq('cantiere_id', id).order('ord').order('created_at'),
  ]);
  if (anag.error) { console.error(anag.error); toast('Errore caricamento cantiere', 'error'); state.loading=false; return; }
  state.cantiere = {
    anagrafica: anag.data,
    contatti: contatti.data || [],
    attivita: attivita.data || [],
    forniture: forniture.data || [],
    costiTecnici: tec.data || [],
    costiCostruzione: costr.data || [],
    pagamenti: pag.data || [],
    note: note.data || [],
    documenti: docs.data || [],
    accessi: accessi.data || [],
    diario: (diario && diario.data) || [],
    piantine: (piantine && piantine.data) || [],
  };
  // Reset selezione piantina e cache URL quando cambio cantiere
  state.piantinaSel = null;
  state.pinPlacing = null;
  state._piantinaUrls = {};
  state.loading = false;
}

   MUTATIONS — scrittura su Supabase
   ============================================================ */
const app = {
  // Navigation
  async goto(view, opts = {}) {
    state.view = view;
    if (opts.tab) state.tab = opts.tab;
    if (opts.cantiereId !== undefined) {
      state.cantiereId = opts.cantiereId;
      if (opts.cantiereId) {
        await caricaCantiere(opts.cantiereId);
        if (!opts.tab) state.tab = 'dashboard';
      } else {
        state.cantiere = null;
      }
    }
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
    document.body.classList.remove('sidebar-open');
  },
  setTab(tab) { state.tab = tab; state.pinPlacing = null; render(); window.scrollTo({ top: 0 }); document.body.classList.remove('sidebar-open'); },
  setGanttView(v) { state.ganttView = v; render(); },
  setSortCantieri(v) {
    state.sortCantieri = v;
    try { localStorage.setItem('ekod_sort_cantieri', v); } catch (e) {}
    render();
  },
  setFilterCantieri(v) {
    state.filterCantieri = v;
    try { localStorage.setItem('ekod_filter_cantieri', v); } catch (e) {}
    render();
  },

  // Cantieri (solo studio)
  async creaCantiere() {
    if (!state.isStudio) return;
    const nome = prompt('Nome del nuovo cantiere:');
    if (!nome) return;

  async setAnagrafica(field, value) {
    if (!state.cantiere) return;

    // Aggiorno subito in memoria per UI reattiva

  // Sezioni generiche (contatti, attivita, forniture, tecnici, costruzione, pagamenti, note)
  async addRow(sezione) {
    if (!state.cantiere || !SEZIONI[sezione]) return;
    if (!state.isStudio && sezione !== 'note') return;   // solo studio inserisce (eccetto note)
    const conf = SEZIONI[sezione];
    const factory = window[conf.newFn];
    const row = factory();
    row.cantiere_id = state.cantiere.anagrafica.id;
    const arr = state.cantiere[sezione];
    // Solo le tabelle che hanno la colonna 'ord' (tutte tranne 'note')
    if (sezione !== 'note') row.ord = arr.length;
    const { data, error } = await sb.from(conf.table).insert(row).select().single();
    if (error) { console.error(error); toast('Errore: ' + error.message, 'error'); return; }
    arr.push(data);
    if (sezione === 'note') {
      // Le note sono ordinate per data desc → inserisco in cima
      arr.pop();
      arr.unshift(data);
    }
    render();
    showSaveIndicator();
  },

  async setRow(sezione, id, field, value) {
    if (!state.cantiere || !SEZIONI[sezione]) return;
    const conf = SEZIONI[sezione];
    const arr = state.cantiere[sezione];
    const r = arr.find(x => x.id === id);
    if (!r) return;
    if (field === 'avanzamento') value = Math.max(0, Math.min(100, parseInt(value) || 0));
    // Normalizza vuoti per date/numeri (Postgres rifiuta stringa vuota su date/numeric)
    let payloadValue = value;
    if (value === '') {
      // I campi data e numeri vanno null
      if (['inizio','fine','data','data_ordine','consegna_prev','consegna_eff','data_prev','data_appr','data_saldo','data_prevista','data_fattura','data_incasso','quantita','costo_unit','importo_prev','importo_incass'].includes(field)) {
        payloadValue = null;
      }
    }
    r[field] = payloadValue;
    const { error } = await sb.from(conf.table).update({ [field]: payloadValue }).eq('id', id);
    if (error) { console.error(error); toast('Errore: ' + error.message, 'error'); return; }
    showSaveIndicator();

    // Quando si imposta/cambia il destinatario di una nota, ri-renderizzo così
    // le icone WhatsApp/email del ticket appaiono o scompaiono subito.
    if (sezione === 'note' && field === 'destinatario_contatto_id') {
      render();
      return;
    }

    // UI updates incrementali
    if (sezione === 'attivita') {
      if (field === 'inizio' || field === 'fine') {
        const dur = daysBetween(r.inizio, r.fine);
        const cell = document.querySelector(`[data-att-id="${id}"][data-durata-cell]`);
        if (cell) cell.textContent = dur != null ? `${dur} gg` : '—';
      }
      if (field === 'avanzamento') {
        const cell = document.querySelector(`[data-att-id="${id}"][data-progress-cell]`);
        if (cell) cell.outerHTML = progressBarHTML(r.avanzamento, id);
      }
    }
    if (sezione === 'forniture' || sezione === 'costiTecnici' || sezione === 'costiCostruzione') {
      if (field === 'quantita' || field === 'costo_unit' || field === 'iva') {
        const tot = rowTotal(r);
        const cell = document.querySelector(`[data-row-id="${id}"][data-tot-cell]`);
        if (cell) cell.textContent = tot ? fmtMoneyDecimal(tot) : '—';
        const totAll = sumImporti(arr);
        const grand = document.querySelector(`[data-grand-total="${sezione}"]`);
        if (grand) grand.textContent = fmtMoneyDecimal(totAll);
      }
    }
    if (sezione === 'pagamenti' && (field === 'importo_prev' || field === 'importo_incass')) {
      updatePagamentiTotali();
      const prev = parseFloat(r.importo_prev) || 0;
      const inc = parseFloat(r.importo_incass) || 0;
      const res = prev - inc;
      const perc = prev > 0 ? inc / prev : 0;
      const resCell = document.querySelector(`[data-pag-id="${id}"][data-residuo-cell]`);
      if (resCell) resCell.textContent = prev ? fmtMoneyDecimal(res) : '—';
      const percCell = document.querySelector(`[data-pag-id="${id}"][data-perc-cell]`);
      if (percCell) percCell.textContent = prev ? Math.round(perc * 100) + '%' : '—';
    }

    // Notifica automatica allo studio quando un CLIENTE scrive il testo di una sua nota.
    // Parte solo: se chi scrive è un cliente, sul campo descrizione, con testo non vuoto,
    // e una sola volta per nota (flag _avvisato per non rinviare a ogni modifica).
    if (sezione === 'note' && !state.isStudio && field === 'descrizione') {
      const testo = (value || '').trim();
      if (testo && !r._avvisato && r.autore === state.user.email) {
        r._avvisato = true; // marco subito per evitare invii doppi
        this.notificaStudioNuovaNota(r);
      }
    }
  },

  // Risolve il destinatario di una nota → { nome, telefono, email } oppure null
  _resolveDest(nota) {
    const tipo = nota.destinatario_tipo || (nota.destinatario_contatto_id ? 'sub' : '');
    const id = nota.destinatario_id || nota.destinatario_contatto_id || '';
    if (tipo === 'studio') {
      const m = STUDIO_MEMBERS.find(x => x.key === id);
      return m ? { tipo, nome: m.nome, telefono: m.telRaw, email: m.mail } : null;
    }
    if (tipo === 'sub') {
      const c = (state.cantiere.contatti || []).find(x => x.id === id);
      return c ? { tipo, nome: c.referente || c.azienda || 'Fornitore', telefono: c.telefono, email: c.email } : null;
    }
    return null;
  },

  // Invia la nota via WhatsApp (link wa.me) a studio o subappaltatore
  inviaTicketWhatsapp(notaId) {
    if (!state.isStudio || !state.cantiere) return;
    const nota = state.cantiere.note.find(n => n.id === notaId);
    if (!nota) return;
    const dest = this._resolveDest(nota);
    if (!dest) { toast('Destinatario non trovato', 'error'); return; }

    let digits = (dest.telefono || '').replace(/[^0-9]/g, '');
    if (digits.startsWith('00')) digits = digits.slice(2);
    else if (!digits.startsWith('39') && digits.length <= 10) digits = '39' + digits;
    if (!digits) { toast('Questo destinatario non ha un numero di telefono valido', 'error'); return; }

    const testo = buildTicketText(nota, { referente: dest.nome }, state.cantiere.anagrafica);
    const url = `https://wa.me/${digits}?text=${encodeURIComponent(testo)}`;
    window.open(url, '_blank');
  },

  // Notifica il cliente via email (Edge Function "notifica-nota")
  async notificaCliente(notaId) {
    if (!state.isStudio || !state.cantiere) return;
    const nota = state.cantiere.note.find(n => n.id === notaId);
    if (!nota) { toast('Nota non trovata', 'error'); return; }

    // Trovo l'email del cliente dagli accessi del cantiere
    const accessi = state.cantiere.accessi || [];
    if (accessi.length === 0) {
      toast('Nessun cliente ha accesso a questo cantiere. Aggiungi un accesso cliente prima di notificare.', 'error');
      return;
    }

    // Se c'è più di un cliente, notifico tutti
    const destinatari = accessi.map(a => ({ email: a.email, nome: a.nome || 'Cliente' }));

    // Chiedo conferma includendo cosa verrà inviato
    const elenco = destinatari.map(d => d.email).join(', ');
    if (!confirm(`Inviare una notifica email per questa nota a:\n${elenco}?`)) return;

    toast('Invio in corso…', 'info');

    // Recupero il token di sessione per autenticare le chiamate
    const accessToken = await getFreshAccessToken();
    const authHeaders = accessToken
      ? { Authorization: `Bearer ${accessToken}`, apikey: SUPABASE_ANON_KEY }
      : { apikey: SUPABASE_ANON_KEY };

    let inviati = 0, errori = 0;
    let ultimoErrore = '';
    for (const dest of destinatari) {
      try {
        const { data, error } = await sb.functions.invoke('notifica-nota', {
          body: {
            destinatarioEmail: dest.email,
            destinatarioNome: dest.nome,
            cantiereNome: state.cantiere.anagrafica.nome || 'Cantiere',
            notaTipo: nota.tipo || 'Nota',
            notaData: nota.data ? fmtDate(nota.data) : '',
            notaDescrizione: nota.descrizione || '',
            notaStato: nota.stato || '',
            includiTesto: true,
          },
          headers: authHeaders,
        });
        if (error || (data && data.success === false)) {
          console.error('Errore invio a', dest.email, error || data);
          ultimoErrore = (data && data.error) ? data.error : (error?.message || 'errore sconosciuto');
          errori++;
        } else {
          inviati++;
        }
      } catch (e) {
        console.error('Eccezione invio a', dest.email, e);
        ultimoErrore = e.message || String(e);
        errori++;
      }
    }

    if (inviati > 0 && errori === 0) {
      toast(`Notifica inviata a ${inviati} ${inviati === 1 ? 'cliente' : 'clienti'}`, 'success');
    } else if (inviati > 0 && errori > 0) {
      toast(`Inviate ${inviati}, ${errori} fallite. ${ultimoErrore}`, 'error');
    } else {
      toast('Invio fallito: ' + (ultimoErrore || 'verifica la configurazione email'), 'error');
    }
  },

  /* ============================================================
     IMPORT CSV FORNITURE — dal Preventivatore
     Formato atteso (separatore ';'):
     prodotto;fornitore;quantita;um;costo_unit;iva;stato
     ============================================================ */
  async importFornitureCSV(input) {
    const file = input.files && input.files[0];
    input.value = '';
    if (!file || !state.isStudio || !state.cantiere) return;
    try {
      let text = await file.text();
      text = text.replace(/^\uFEFF/, ''); // BOM
      const righe = text.split(/\r?\n/).filter(l => l.trim() !== '');
      if (righe.length < 2) { toast('Il CSV non contiene righe da importare', 'error'); return; }

      // Separatore: ';' (export del Preventivatore) con fallback ','
      const sep = (righe[0].match(/;/g) || []).length >= (righe[0].match(/,/g) || []).length ? ';' : ',';

      // Parser semplice con supporto ai campi tra virgolette
      const parseLine = (line) => {
        const out = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (inQ) {
            if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
            else if (ch === '"') inQ = false;
            else cur += ch;
          } else {
            if (ch === '"') inQ = true;
            else if (ch === sep) { out.push(cur); cur = ''; }
            else cur += ch;
          }
        }
        out.push(cur);
        return out.map(s => s.trim());
      };

      // Mappa colonne dall'intestazione (case-insensitive)
      const header = parseLine(righe[0]).map(h => h.toLowerCase());
      const col = (nome) => header.indexOf(nome);
      const iProdotto = col('prodotto');
      if (iProdotto === -1) {
        toast('Intestazione non riconosciuta: manca la colonna "prodotto". È il CSV esportato dal Preventivatore?', 'error');
        return;
      }
      const iFornitore = col('fornitore'), iQta = col('quantita'), iUm = col('um'),
            iCosto = col('costo_unit'), iIva = col('iva'), iStato = col('stato');

      // Normalizzazioni contro le liste dell'app
      const numOrNull = (v) => {
        if (v == null || String(v).trim() === '') return null;
        let t = String(v).trim().replace(/[€\s]/g, '');
        // "1.234,56" (formato italiano) → "1234.56"; "12,5" → "12.5"; "12.34" resta
        if (t.includes('.') && t.includes(',')) t = t.replace(/\./g, '').replace(',', '.');
        else t = t.replace(',', '.');
        const n = parseFloat(t);
        return isNaN(n) ? null : n;
      };
      const matchLista = (v, lista) => {
        if (!v) return '';
        const t = String(v).trim();
        const hit = (lista || []).find(o => (o.valore || '').trim().toLowerCase() === t.toLowerCase());
        return hit ? hit.valore : t; // se non in lista, mantengo il valore com'è
      };
      const normIva = (v) => {
        if (!v) return '';
        let t = String(v).trim();
        if (/^\d+([.,]\d+)?$/.test(t)) t += '%';           // "22" → "22%"
        t = t.replace(',', '.').replace(/\.0+%$/, '%');    // "22.0%" → "22%"
        return matchLista(t, state.liste.aliquoteIVA);
      };

      const cid = state.cantiere.anagrafica.id;
      const startOrd = state.cantiere.forniture.length;
      const nuove = [];
      const scartate = [];
      for (let r = 1; r < righe.length; r++) {
        const c = parseLine(righe[r]);
        const prodotto = (c[iProdotto] || '').trim();
        if (!prodotto) { scartate.push(r + 1); continue; }  // riga senza prodotto: la salto
        nuove.push({
          cantiere_id: cid,
          ord: startOrd + nuove.length,
          n_ordine: '',
          prodotto: prodotto,
          fornitore: iFornitore !== -1 ? (c[iFornitore] || '').trim() : '',
          quantita: iQta !== -1 ? numOrNull(c[iQta]) : null,
          um: iUm !== -1 ? matchLista(c[iUm], state.liste.unitaMisura) : '',
          costo_unit: iCosto !== -1 ? numOrNull(c[iCosto]) : null,
          iva: iIva !== -1 ? normIva(c[iIva]) : '',
          data_ordine: null, consegna_prev: null, consegna_eff: null,
          stato: iStato !== -1 ? matchLista(c[iStato], state.liste.statiOrdini) : '',
          note: '',
        });
      }
      if (!nuove.length) { toast('Nessuna riga valida nel CSV', 'error'); return; }

      const tot = nuove.reduce((s, x) => s + (x.quantita || 0) * (x.costo_unit || 0), 0);
      let msg = `Importare ${nuove.length} ${nuove.length === 1 ? 'riga' : 'righe'} negli ordini forniture?`;
      if (tot > 0) msg += `\nImponibile complessivo: € ${tot.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      if (scartate.length) msg += `\n(${scartate.length} ${scartate.length === 1 ? 'riga scartata' : 'righe scartate'} perché senza prodotto)`;
      msg += `\n\nLe righe verranno AGGIUNTE a quelle esistenti.`;
      if (!confirm(msg)) return;

      const { data, error } = await sb.from('forniture').insert(nuove).select();
      if (error) throw error;
      (data || []).forEach(row => state.cantiere.forniture.push(row));
      toast(`${(data || []).length} righe importate dal Preventivatore`);
      render();
      showSaveIndicator();
    } catch (e) {
      console.error(e);
      toast('Errore import CSV: ' + e.message, 'error');
    }
  },

  // Documenti (storage)
  async uploadDocumenti(files, cartella) {
    if (!state.isStudio || !state.cantiere) return;
    if (!files || files.length === 0) return;
    const cantiereId = state.cantiere.anagrafica.id;
    let okCount = 0;
    for (const file of files) {
      // Limite singolo file (Supabase free tier: 50MB)
      if (file.size > 50 * 1024 * 1024) {
        toast(`"${file.name}" supera 50 MB e non può essere caricato`, 'error');
        continue;
      }
      // Genero un path univoco: cantiereId/cartella/timestamp-nome
      const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
      const safeCartella = (cartella || '').replace(/[^a-zA-Z0-9 \-_]/g, '_').trim();
      const ts = Date.now();
      const storagePath = `${cantiereId}/${ts}-${safeName}`;
      try {
        const { error: upErr } = await sb.storage.from('documenti').upload(storagePath, file, {
          cacheControl: '3600',
          upsert: false,
        });
        if (upErr) throw upErr;
        // Registro il metadato
        const { data, error: insErr } = await sb.from('documenti').insert({
          cantiere_id: cantiereId,
          cartella: safeCartella,
          nome_file: file.name,
          storage_path: storagePath,
          mime_type: file.type || '',
          dimensione_bytes: file.size,
          caricato_da: state.user.email,
        }).select().single();
        if (insErr) throw insErr;
        state.cantiere.documenti.unshift(data);
        okCount++;
      } catch (e) {
        console.error(e);
        toast(`Errore caricamento "${file.name}": ${e.message}`, 'error');
      }
    }
    if (okCount > 0) {
      toast(`${okCount} ${okCount === 1 ? 'documento caricato' : 'documenti caricati'}`);
      render();
    }
  },

  /* ============================================================
     PIANTINE (sezione Note) — upload PDF, conversione, viewer
     ============================================================ */

  // Entry point: upload di un nuovo PDF piantina (solo studio)
  async uploadPiantinaPdf(input) {
    const file = input.files && input.files[0];
    input.value = '';
    if (!file) return;
    await this._avviaImportPdf(file, { mode: 'new' });
  },

  // Entry point: sostituzione del PDF di una piantina esistente
  async sostituisciPiantinaPdf(input, piantinaId) {
    const file = input.files && input.files[0];
    input.value = '';
    if (!file) return;
    await this._avviaImportPdf(file, { mode: 'replace', targetId: piantinaId });
  },

  // Legge il PDF con PDF.js; se multipagina apre il selettore pagina
  async _avviaImportPdf(file, opts) {
    if (!state.isStudio || !state.cantiere) return;
    if (!/\.pdf$/i.test(file.name) && file.type !== 'application/pdf') {
      toast('Seleziona un file PDF', 'error'); return;
    }
    if (file.size > 50 * 1024 * 1024) {
      toast('Il PDF supera 50 MB e non può essere caricato', 'error'); return;
    }
    if (!window.pdfjsLib) { toast('Libreria PDF non caricata: ricarica la pagina', 'error'); return; }
    toast('Lettura del PDF…');
    try {
      const buf = await file.arrayBuffer();
      const pdfDoc = await window.pdfjsLib.getDocument({ data: buf }).promise;
      state._pp = { pdfDoc, file, mode: opts.mode, targetId: opts.targetId || null, multi: pdfDoc.numPages > 1 };
      if (pdfDoc.numPages === 1) {
        await this.importaPaginaPiantina(1);
      } else {
        await this._apriPickerPagine();
      }
    } catch (e) {
      console.error(e);
      toast('Errore lettura PDF: ' + e.message, 'error');
      state._pp = null;
    }
  },

  // Renderizza una pagina del PDF su canvas (maxDim = lato massimo in px)
  async _renderPaginaPdf(pdfDoc, pageNum, maxDim) {
    const page = await pdfDoc.getPage(pageNum);
    const vp1 = page.getViewport({ scale: 1 });
    const scale = maxDim / Math.max(vp1.width, vp1.height);
    const vp = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(vp.width);
    canvas.height = Math.round(vp.height);
    const ctx = canvas.getContext('2d');
    // Sfondo bianco (i PDF possono avere trasparenza)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    return canvas;
  },

  // Overlay di scelta pagina per PDF multipagina
  async _apriPickerPagine() {
    const pp = state._pp;
    if (!pp) return;
    const host = document.createElement('div');
    host.className = 'pp-overlay';
    host.id = 'pp-overlay';
    host.innerHTML = `
      <div class="pp-box">
        <div class="pp-head">
          <span>Quale pagina vuoi ${pp.mode === 'replace' ? 'usare come nuova piantina' : 'importare'}?</span>
          <button class="btn btn-ghost" onclick="app.chiudiPickerPagine()">Annulla</button>
        </div>
        <div class="pp-grid" id="pp-grid"></div>
      </div>`;
    host.addEventListener('click', (e) => { if (e.target === host) app.chiudiPickerPagine(); });
    document.body.appendChild(host);
    const grid = host.querySelector('#pp-grid');
    // Thumbnail progressive delle pagine
    for (let n = 1; n <= pp.pdfDoc.numPages; n++) {
      if (!document.getElementById('pp-overlay')) return; // chiuso nel frattempo
      try {
        const cnv = await this._renderPaginaPdf(pp.pdfDoc, n, 300);
        const btn = document.createElement('button');
        btn.className = 'pp-page';
        btn.innerHTML = `<div class="pp-lbl">Pagina ${n}</div>`;
        btn.insertBefore(cnv, btn.firstChild);
        cnv.style.width = '100%'; cnv.style.display = 'block'; cnv.style.background = '#fff';
        btn.onclick = () => app.importaPaginaPiantina(n);
        grid.appendChild(btn);
      } catch (e) { console.warn('Thumb pagina ' + n, e); }
    }
  },

  chiudiPickerPagine() {
    const el = document.getElementById('pp-overlay');
    if (el) el.remove();
    // Non azzero _pp qui se un import è in corso; l'import lo pulisce da sé
  },

  // Importa (o sostituisce con) la pagina scelta: render ad alta risoluzione,
  // upload PNG + PDF originale, insert/update del record piantine
  async importaPaginaPiantina(pageNum) {
    const pp = state._pp;
    if (!pp || !state.cantiere) return;
    this.chiudiPickerPagine();
    const cid = state.cantiere.anagrafica.id;
    toast('Elaborazione della piantina…');
    try {
      // Render ad alta risoluzione per lo zoom sui dettagli
      const canvas = await this._renderPaginaPdf(pp.pdfDoc, pageNum, 2600);
      const blob = await new Promise((res, rej) =>
        canvas.toBlob(b => b ? res(b) : rej(new Error('Conversione immagine fallita')), 'image/png'));
      const ts = Date.now();
      const pngPath = `${cid}/piantine/${ts}-pag${pageNum}.png`;
      const pdfPath = `${cid}/piantine/${ts}-src.pdf`;
      // Upload PNG renderizzato
      const { error: e1 } = await sb.storage.from('documenti').upload(pngPath, blob, { cacheControl: '3600', upsert: false, contentType: 'image/png' });
      if (e1) throw e1;
      // Upload PDF originale (resta scaricabile)
      const { error: e2 } = await sb.storage.from('documenti').upload(pdfPath, pp.file, { cacheControl: '3600', upsert: false, contentType: 'application/pdf' });
      if (e2) throw e2;

      if (pp.mode === 'replace' && pp.targetId) {
        // ---- SOSTITUZIONE ----
        const p = state.cantiere.piantine.find(x => x.id === pp.targetId);
        if (!p) throw new Error('Piantina non trovata');
        // Note con flag posizionati su questa piantina
        const notePin = (state.cantiere.note || []).filter(n => n.piantina_id === p.id && n.pin_x != null);
        if (notePin.length > 0) {
          const mantieni = confirm(
            `Su questa piantina ci sono ${notePin.length} ${notePin.length === 1 ? 'flag posizionato' : 'flag posizionati'}.\n\n` +
            `OK  =  mantieni le posizioni dei flag sulla nuova piantina\n` +
            `Annulla  =  azzera le posizioni (le note restano, senza flag)`);
          if (!mantieni) {
            const { error: eN } = await sb.from('note').update({ pin_x: null, pin_y: null }).eq('piantina_id', p.id);
            if (eN) throw eN;
            (state.cantiere.note || []).forEach(n => { if (n.piantina_id === p.id) { n.pin_x = null; n.pin_y = null; } });
          }
        }
        const vecchi = [p.storage_path, p.pdf_path].filter(Boolean);
        const { data, error: eU } = await sb.from('piantine')
          .update({ storage_path: pngPath, pdf_path: pdfPath })
          .eq('id', p.id).select().single();
        if (eU) throw eU;
        Object.assign(p, data);
        // Pulizia dei vecchi file (non blocco in caso di errore)
        if (vecchi.length) { const { error: eS } = await sb.storage.from('documenti').remove(vecchi); if (eS) console.warn(eS); }
        delete state._piantinaUrls[p.id];
        state.piantinaSel = p.id;
        toast('Piantina sostituita');
      } else {
        // ---- NUOVA PIANTINA ----
        const base = pp.file.name.replace(/\.pdf$/i, '');
        const nome = pp.multi ? `${base} — pag. ${pageNum}` : base;
        const { data, error: eI } = await sb.from('piantine').insert({
          cantiere_id: cid,
          nome: nome,
          storage_path: pngPath,
          pdf_path: pdfPath,
          ord: (state.cantiere.piantine || []).length,
        }).select().single();
        if (eI) throw eI;
        state.cantiere.piantine.push(data);
        state.piantinaSel = data.id;
        toast('Piantina caricata');
      }
      state._pp = null;
      render();
      showSaveIndicator();
    } catch (e) {
      console.error(e);
      toast('Errore caricamento piantina: ' + e.message, 'error');
      state._pp = null;
    }
  },

  selezionaPiantina(id) {
    state.piantinaSel = id;
    render();
  },

  async rinominaPiantina(id) {
    if (!state.isStudio) return;
    const p = state.cantiere?.piantine?.find(x => x.id === id);
    if (!p) return;
    const nuovo = prompt('Nome della piantina (es. "Piano terra", "Primo piano"):', p.nome || '');
    if (nuovo === null) return;
    const nome = nuovo.trim() || 'Piantina';
    const { error } = await sb.from('piantine').update({ nome }).eq('id', id);
    if (error) { toast('Errore: ' + error.message, 'error'); return; }
    p.nome = nome;
    render();
    showSaveIndicator();
  },

  async scaricaPiantinaPdf(id) {
    const p = state.cantiere?.piantine?.find(x => x.id === id);
    if (!p) return;
    const path = p.pdf_path || p.storage_path;
    try {
      const { data, error } = await sb.storage.from('documenti').createSignedUrl(path, 60);
      if (error) throw error;
      window.open(data.signedUrl, '_blank');
    } catch (e) {
      console.error(e);
      toast('Errore apertura PDF: ' + e.message, 'error');
    }
  },

  async eliminaPiantina(id) {
    if (!state.isStudio) return;
    const p = state.cantiere?.piantine?.find(x => x.id === id);
    if (!p) return;
    const noteColl = (state.cantiere.note || []).filter(n => n.piantina_id === id);
    let msg = `Eliminare la piantina "${p.nome}"?`;
    if (noteColl.length > 0) {
      msg += `\n\nCi sono ${noteColl.length} ${noteColl.length === 1 ? 'nota collegata' : 'note collegate'}: le note NON verranno eliminate, ma i loro flag sulla piantina sì.`;
    }
    if (!confirm(msg)) return;
    try {
      // Scollego le note (flag rimossi, note intatte)
      if (noteColl.length > 0) {
        const { error: eN } = await sb.from('note').update({ piantina_id: null, pin_x: null, pin_y: null }).eq('piantina_id', id);
        if (eN) throw eN;
        noteColl.forEach(n => { n.piantina_id = null; n.pin_x = null; n.pin_y = null; });
      }
      // Rimuovo i file dallo storage
      const paths = [p.storage_path, p.pdf_path].filter(Boolean);
      if (paths.length) { const { error: eS } = await sb.storage.from('documenti').remove(paths); if (eS) console.warn(eS); }
      // Elimino il record
      const { error: eD } = await sb.from('piantine').delete().eq('id', id);
      if (eD) throw eD;
      state.cantiere.piantine = state.cantiere.piantine.filter(x => x.id !== id);
      delete state._piantinaUrls[id];
      if (state.piantinaSel === id) state.piantinaSel = state.cantiere.piantine[0]?.id || null;
      toast('Piantina eliminata');
      render();
      showSaveIndicator();
    } catch (e) {
      console.error(e);
      toast('Errore eliminazione: ' + e.message, 'error');
    }
  },

  /* ---------- Posizionamento flag sulla piantina ---------- */

  avviaPosizionamentoPin(notaId) {
    if (!state.cantiere) return;
    if (!(state.cantiere.piantine || []).length) {
      toast('Carica prima una piantina (PDF) nel pannello in alto', 'error');
      return;
    }
    const n = (state.cantiere.note || []).find(x => x.id === notaId);
    if (!n) return;
    // Se la nota ha già un flag, mostro la sua piantina per riposizionare da lì
    if (n.piantina_id && (state.cantiere.piantine || []).find(p => p.id === n.piantina_id)) {
      state.piantinaSel = n.piantina_id;
    }
    state.pinPlacing = notaId;
    render();
    // Porto la piantina in vista
    setTimeout(() => {
      const vp = document.getElementById('pv-viewport');
      if (vp) vp.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  },

  annullaPosizionamentoPin() {
    state.pinPlacing = null;
    render();
  },

  // Chiamato dal viewer su "tap" (pressione senza trascinamento) in modalità posizionamento
  async _piazzaPin(clientX, clientY) {
    const notaId = state.pinPlacing;
    if (!notaId) return;
    const vp = document.getElementById('pv-viewport');
    const img = vp && vp.querySelector('#pv-img');
    if (!vp || !img || !img.naturalWidth) return;
    const pid = vp.dataset.piantinaId;
    const t = this._pvT_of(vp);
    if (!t) return;
    // Coordinate schermo → coordinate immagine → percentuale
    const r = vp.getBoundingClientRect();
    const ix = (clientX - r.left - t.tx) / t.s;
    const iy = (clientY - r.top - t.ty) / t.s;
    const px = (ix / img.naturalWidth) * 100;
    const py = (iy / img.naturalHeight) * 100;
    // Ignoro i tocchi fuori dal disegno
    if (px < 0 || px > 100 || py < 0 || py > 100) {
      toast('Tocca un punto all\'interno della piantina', 'error');
      return;
    }
    const pin_x = Math.round(px * 100) / 100;
    const pin_y = Math.round(py * 100) / 100;
    try {
      const { error } = await sb.from('note')
        .update({ piantina_id: pid, pin_x, pin_y })
        .eq('id', notaId);
      if (error) throw error;
      const n = (state.cantiere.note || []).find(x => x.id === notaId);
      if (n) { n.piantina_id = pid; n.pin_x = pin_x; n.pin_y = pin_y; }
      state.pinPlacing = null;
      toast(`Flag posizionato${n && n.numero ? ' — nota n.' + n.numero : ''}`);
      render();
      showSaveIndicator();
    } catch (e) {
      console.error(e);
      toast('Errore salvataggio flag: ' + e.message, 'error');
    }
  },

  async rimuoviPin(notaId) {
    const n = (state.cantiere?.note || []).find(x => x.id === notaId);
    if (!n) return;
    try {
      const { error } = await sb.from('note')
        .update({ piantina_id: null, pin_x: null, pin_y: null })
        .eq('id', notaId);
      if (error) throw error;
      n.piantina_id = null; n.pin_x = null; n.pin_y = null;
      toast('Flag rimosso');
      render();
      showSaveIndicator();
    } catch (e) {
      console.error(e);
      toast('Errore: ' + e.message, 'error');
    }
  },

  /* ---------- Interazione bidirezionale card ↔ pin ---------- */

  // Hover su una card nota → il pin corrispondente si ingrandisce e pulsa
  evidenziaPin(notaId, on) {
    const pin = document.querySelector(`.piantina-pin[data-nota-id="${notaId}"]`);
    if (!pin) return; // nota senza flag o flag su un altro piano non visualizzato
    pin.classList.toggle('evidenza', !!on);
  },

  // Tocco sul badge numero (o su "Flag su …") → porto in vista la piantina
  // giusta ed evidenzio il pin per qualche secondo
  vaiAlPin(notaId) {
    const n = (state.cantiere?.note || []).find(x => x.id === notaId);
    if (!n || n.pin_x == null || !n.piantina_id) return;
    // Se il flag è su un altro piano, cambio piantina
    if (state.piantinaSel !== n.piantina_id) {
      state.piantinaSel = n.piantina_id;
      render();
    }
    setTimeout(() => {
      const vp = document.getElementById('pv-viewport');
      if (vp) vp.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const pin = document.querySelector(`.piantina-pin[data-nota-id="${notaId}"]`);
      if (pin) {
        pin.classList.add('evidenza');
        setTimeout(() => pin.classList.remove('evidenza'), 3000);
      }
    }, 60);
  },

  // Tocco su un pin della piantina → scorro alla card e la evidenzio
  vaiANota(notaId) {
    const card = document.getElementById(`nota-card-${notaId}`);
    if (!card) return;
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.remove('evidenza');
    // Forzo il riavvio dell'animazione
    void card.offsetWidth;
    card.classList.add('evidenza');
    setTimeout(() => card.classList.remove('evidenza'), 2500);
  },

  /* ---------- Viewer piantina: idratazione immagine + zoom/pan ---------- */

  // Chiamato dopo ogni render del tab Note: carica l'immagine e attacca gli eventi
  async initPiantinaViewer() {
    const vp = document.getElementById('pv-viewport');
    if (!vp) return;
    const pid = vp.dataset.piantinaId;
    const p = state.cantiere?.piantine?.find(x => x.id === pid);
    if (!p) return;

    // Attacco gli eventi (il DOM è ricreato a ogni render)
    if (!vp.dataset.pvInit) {
      vp.dataset.pvInit = '1';
      this._pvBind(vp);
    }

    // Signed URL con cache (validità 1h, ricreo se mancano <5 min)
    state._piantinaUrls = state._piantinaUrls || {};
    let entry = state._piantinaUrls[pid];
    if (!entry || entry.exp - Date.now() < 5 * 60 * 1000) {
      try {
        const { data, error } = await sb.storage.from('documenti').createSignedUrl(p.storage_path, 3600);
        if (error) throw error;
        entry = { url: data.signedUrl, exp: Date.now() + 3600 * 1000 };
        state._piantinaUrls[pid] = entry;
      } catch (e) {
        console.error(e);
        const ld = vp.querySelector('.piantina-loading');
        if (ld) ld.textContent = 'Errore caricamento immagine';
        return;
      }
    }
    const img = vp.querySelector('#pv-img');
    if (!img) return;
    if (img.dataset.loadedFor === pid && img.src) { this._pvRestore(vp, pid); return; }
    img.onload = () => {
      img.dataset.loadedFor = pid;
      img.style.width = img.naturalWidth + 'px';
      img.style.height = img.naturalHeight + 'px';
      const ld = vp.querySelector('.piantina-loading');
      if (ld) ld.remove();
      this._pvRestore(vp, pid);
    };
    img.src = entry.url;
  },

  // Ripristina la vista salvata per questa piantina, oppure adatta al riquadro
  _pvRestore(vp, pid) {
    state._pvT = state._pvT || {};
    const img = vp.querySelector('#pv-img');
    if (!img || !img.naturalWidth) return;
    let t = state._pvT[pid];
    if (!t) {
      const s = Math.min(vp.clientWidth / img.naturalWidth, vp.clientHeight / img.naturalHeight) * 0.97;
      t = { s, tx: (vp.clientWidth - img.naturalWidth * s) / 2, ty: (vp.clientHeight - img.naturalHeight * s) / 2 };
      state._pvT[pid] = t;
    }
    this._pvApply(vp, t);
  },

  _pvApply(vp, t) {
    const cnv = vp.querySelector('.piantina-canvas');
    if (!cnv) return;
    cnv.style.transform = `translate(${t.tx}px, ${t.ty}px) scale(${t.s})`;
    cnv.style.setProperty('--pin-inv', (1 / t.s).toFixed(4));
  },

  _pvT_of(vp) {
    const pid = vp.dataset.piantinaId;
    state._pvT = state._pvT || {};
    return state._pvT[pid];
  },

  _pvFit() {
    const vp = document.getElementById('pv-viewport');
    if (!vp) return;
    const pid = vp.dataset.piantinaId;
    if (state._pvT) delete state._pvT[pid];
    this._pvRestore(vp, pid);
  },

  // Zoom centrato su un punto dello schermo
  _pvZoomAt(vp, clientX, clientY, factor) {
    const t = this._pvT_of(vp);
    if (!t) return;
    const r = vp.getBoundingClientRect();
    const px = clientX - r.left, py = clientY - r.top;
    const img = vp.querySelector('#pv-img');
    const fit = img && img.naturalWidth
      ? Math.min(vp.clientWidth / img.naturalWidth, vp.clientHeight / img.naturalHeight)
      : 0.05;
    const ns = Math.min(Math.max(t.s * factor, fit * 0.4), 10);
    const k = ns / t.s;
    t.tx = px - (px - t.tx) * k;
    t.ty = py - (py - t.ty) * k;
    t.s = ns;
    this._pvApply(vp, t);
  },

  pvZoomStep(factor) {
    const vp = document.getElementById('pv-viewport');
    if (!vp) return;
    const r = vp.getBoundingClientRect();
    this._pvZoomAt(vp, r.left + r.width / 2, r.top + r.height / 2, factor);
  },

  // Pan (drag / touch) + pinch-to-zoom + rotellina + tap di posizionamento
  _pvBind(vp) {
    const self = this;
    const pointers = new Map();
    let lastPan = null, lastDist = null, lastMid = null;
    // Rilevamento tap: se il puntatore si muove meno di 6px ed è un gesto a
    // un solo dito, al rilascio è un "tocco" → in modalità posizionamento piazza il pin
    let tapStart = null, tapMoved = false, gestureMulti = false;
    // Pin toccato all'inizio del gesto (per il tap sul pin → vai alla nota)
    let downPinId = null;

    vp.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = Math.exp(-e.deltaY * 0.0016);
      self._pvZoomAt(vp, e.clientX, e.clientY, factor);
    }, { passive: false });

    vp.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.pv-controls') || e.target.closest('.pin-place-banner')) return;
      vp.setPointerCapture(e.pointerId);
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 1) {
        lastPan = { x: e.clientX, y: e.clientY };
        vp.classList.add('dragging');
        tapStart = { x: e.clientX, y: e.clientY };
        tapMoved = false;
        gestureMulti = false;
        const pinEl = e.target.closest ? e.target.closest('.piantina-pin') : null;
        downPinId = pinEl ? pinEl.dataset.notaId : null;
      } else if (pointers.size === 2) {
        gestureMulti = true;
        const pts = [...pointers.values()];
        lastDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        lastMid = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
        lastPan = null;
      }
    });

    vp.addEventListener('pointermove', (e) => {
      if (!pointers.has(e.pointerId)) return;
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (tapStart && Math.hypot(e.clientX - tapStart.x, e.clientY - tapStart.y) > 6) tapMoved = true;
      const t = self._pvT_of(vp);
      if (!t) return;
      if (pointers.size === 1 && lastPan) {
        t.tx += e.clientX - lastPan.x;
        t.ty += e.clientY - lastPan.y;
        lastPan = { x: e.clientX, y: e.clientY };
        self._pvApply(vp, t);
      } else if (pointers.size === 2 && lastDist) {
        const pts = [...pointers.values()];
        const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        const mid = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
        if (dist > 0 && lastDist > 0) self._pvZoomAt(vp, mid.x, mid.y, dist / lastDist);
        // Pan col movimento del punto medio
        t.tx += mid.x - lastMid.x;
        t.ty += mid.y - lastMid.y;
        self._pvApply(vp, t);
        lastDist = dist; lastMid = mid;
      }
    });

    const up = (e) => {
      const wasTap = pointers.has(e.pointerId) && tapStart && !tapMoved && !gestureMulti && pointers.size === 1;
      pointers.delete(e.pointerId);
      if (pointers.size === 0) {
        lastPan = null; lastDist = null; vp.classList.remove('dragging');
        if (wasTap) {
          // Tocco secco: in modalità posizionamento piazzo il flag,
          // altrimenti se ho toccato un pin vado alla sua nota
          if (state.pinPlacing) self._piazzaPin(e.clientX, e.clientY);
          else if (downPinId) self.vaiANota(downPinId);
        }
        tapStart = null; tapMoved = false; gestureMulti = false; downPinId = null;
      } else if (pointers.size === 1) {
        const pt = [...pointers.values()][0];
        lastPan = { x: pt.x, y: pt.y };
        lastDist = null;
      }
    };
    vp.addEventListener('pointerup', up);
    vp.addEventListener('pointercancel', up);
  },

  async downloadDocumento(id) {
    const d = state.cantiere?.documenti?.find(x => x.id === id);
    if (!d) return;
    try {
      const { data, error } = await sb.storage.from('documenti').createSignedUrl(d.storage_path, 60);
      if (error) throw error;
      // Apro in nuova tab
      window.open(data.signedUrl, '_blank');
    } catch (e) {
      console.error(e);
      toast(`Errore apertura documento: ${e.message}`, 'error');
    }
  },

  // Idrata le thumbnail immagine con signed URL dopo il render.
  // Supporta sia data-thumb-id (documenti) sia data-thumb-path (foto diario).
  async hydrateThumbnails() {
    const imgs = Array.from(document.querySelectorAll('img[data-thumb-id], img[data-thumb-path]'));
    if (!imgs.length) return;
    const docs = state.cantiere?.documenti || [];
    await Promise.all(imgs.map(async (img) => {
      if (img.dataset.loaded) return;
      let path = img.dataset.thumbPath;
      if (!path && img.dataset.thumbId) {
        const d = docs.find(x => x.id === img.dataset.thumbId);
        path = d && d.storage_path;
      }
      if (!path) return;
      const wrap = img.closest('.doc-thumb, .df-thumb');
      try {
        const { data, error } = await sb.storage.from('documenti').createSignedUrl(path, 3600);
        if (error) throw error;
        img.onload = () => { if (wrap) wrap.classList.add('ready'); };
        img.onerror = () => { if (wrap) wrap.classList.add('failed'); };
        img.src = data.signedUrl;
        img.dataset.loaded = '1';
      } catch (e) {
        if (wrap) wrap.classList.add('failed');
      }
    }));
  },

  _lightboxKey(e) {
    if (e.key === 'Escape') app.chiudiLightbox();
    else if (e.key === 'ArrowLeft') app.lightboxNav(-1);
    else if (e.key === 'ArrowRight') app.lightboxNav(1);
  },

  // ----- LIGHTBOX GENERICO (items: [{path, nome, bytes}]) -----
  openLightbox(items, index) {
    if (!items || !items.length) return;
    state._lb = { items, index: Math.max(0, Math.min(index || 0, items.length - 1)) };
    app._renderLightbox();
    document.removeEventListener('keydown', app._lightboxKey);
    document.addEventListener('keydown', app._lightboxKey);
  },

  async _renderLightbox() {
    const lb = state._lb;
    if (!lb) return;
    const it = lb.items[lb.index];
    if (!it) return;
    const hasPrev = lb.index > 0;
    const hasNext = lb.index < lb.items.length - 1;
    let ov = document.getElementById('lightbox');
    if (!ov) { ov = document.createElement('div'); ov.id = 'lightbox'; document.body.appendChild(ov); }
    ov.innerHTML = `
      <div class="lb-backdrop" onclick="app.chiudiLightbox()"></div>
      <button class="lb-close" onclick="app.chiudiLightbox()" title="Chiudi">${I.x}</button>
      ${hasPrev ? `<button class="lb-nav prev" onclick="app.lightboxNav(-1)" title="Precedente">‹</button>` : ''}
      ${hasNext ? `<button class="lb-nav next" onclick="app.lightboxNav(1)" title="Successiva">›</button>` : ''}
      <div class="lb-stage">
        <div class="lb-spinner"></div>
        <img class="lb-img" alt="${escapeHtml(it.nome || '')}" style="opacity:0;">
      </div>
      <div class="lb-bar">
        <div class="lb-meta">
          <div class="lb-name">${escapeHtml(it.nome || 'Immagine')}</div>
          <div class="lb-sub">${lb.items.length > 1 ? `${lb.index + 1} di ${lb.items.length}${it.bytes ? ' · ' : ''}` : ''}${it.bytes ? fmtBytes(it.bytes) : ''}</div>
        </div>
        <button class="lb-dl" onclick="app.apriOriginale('${encodeURIComponent(it.path)}')">${I.download} Apri originale</button>
      </div>
    `;
    requestAnimationFrame(() => ov.classList.add('show'));
    const img = ov.querySelector('.lb-img');
    const spinner = ov.querySelector('.lb-spinner');
    try {
      const { data, error } = await sb.storage.from('documenti').createSignedUrl(it.path, 3600);
      if (error) throw error;
      img.onload = () => { img.style.opacity = '1'; if (spinner) spinner.style.display = 'none'; };
      img.onerror = () => { if (spinner) spinner.style.display = 'none'; };
      img.src = data.signedUrl;
    } catch (e) {
      if (spinner) spinner.style.display = 'none';
      toast(`Errore apertura immagine: ${e.message}`, 'error');
    }
  },

  lightboxNav(delta) {
    const lb = state._lb;
    if (!lb) return;
    const j = lb.index + delta;
    if (j < 0 || j >= lb.items.length) return;
    lb.index = j;
    app._renderLightbox();
  },

  chiudiLightbox() {
    const ov = document.getElementById('lightbox');
    document.removeEventListener('keydown', app._lightboxKey);
    state._lb = null;
    if (!ov) return;
    ov.classList.remove('show');
    setTimeout(() => { if (ov && ov.parentNode) ov.remove(); }, 200);
  },

  // Wrapper documenti: mantiene l'entry point esistente apriLightbox(id)
  apriLightbox(id) {
    const docs = state.cantiere?.documenti || [];
    const galleria = state._galleria || [];
    const items = galleria.map(gid => {
      const d = docs.find(x => x.id === gid);
      return d ? { path: d.storage_path, nome: d.nome_file, bytes: d.dimensione_bytes } : null;
    }).filter(Boolean);
    const index = galleria.indexOf(id);
    app.openLightbox(items, index < 0 ? 0 : index);
  },

  async apriOriginale(pathEnc) {
    const path = decodeURIComponent(pathEnc);
    try {
      const { data, error } = await sb.storage.from('documenti').createSignedUrl(path, 60);
      if (error) throw error;
      window.open(data.signedUrl, '_blank');
    } catch (e) {
      toast(`Errore apertura file: ${e.message}`, 'error');
    }
  },

  // ----- DIARIO DI CANTIERE -----
  _diarioFiles: [],

  diarioSelezionaFoto(fileList) {
    const files = Array.from(fileList || []);
    for (const f of files) {
      if (!f.type || !f.type.startsWith('image/')) { toast(`"${f.name}" non è un'immagine`, 'error'); continue; }
      if (f.size > 50 * 1024 * 1024) { toast(`"${f.name}" supera 50 MB`, 'error'); continue; }
      app._diarioFiles.push(f);
    }
    app._renderDiarioPreview();
  },

  diarioRimuoviFoto(i) {
    app._diarioFiles.splice(i, 1);
    app._renderDiarioPreview();
  },

  _renderDiarioPreview() {
    const host = document.getElementById('diario-foto-preview');
    if (!host) return;
    host.innerHTML = app._diarioFiles.map((f, i) => {
      const url = URL.createObjectURL(f);
      return `<div class="dch-chip"><img src="${url}" alt=""><button onclick="app.diarioRimuoviFoto(${i})" title="Rimuovi">${I.x}</button></div>`;
    }).join('');
  },

  async addDiarioEntry() {
    if (!state.isStudio || !state.cantiere) return;
    const cantiereId = state.cantiere.anagrafica.id;
    const dataEl = document.getElementById('diario-data');
    const titoloEl = document.getElementById('diario-titolo');
    const testoEl = document.getElementById('diario-testo');
    const data = (dataEl && dataEl.value) || todayISO();
    const titolo = ((titoloEl && titoloEl.value) || '').trim();
    const testo = ((testoEl && testoEl.value) || '').trim();
    if (!testo && !titolo && !app._diarioFiles.length) { toast('Aggiungi un testo o una foto', 'error'); return; }

    const btn = document.getElementById('diario-pubblica');
    if (btn) { btn.disabled = true; btn.textContent = 'Pubblicazione…'; }
    try {
      const foto = [];
      for (const file of app._diarioFiles) {
        const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
        const storagePath = `${cantiereId}/diario/${Date.now()}-${Math.random().toString(36).slice(2,7)}-${safeName}`;
        const { error: upErr } = await sb.storage.from('documenti').upload(storagePath, file, { cacheControl: '3600', upsert: false });
        if (upErr) throw upErr;
        foto.push({ path: storagePath, nome: file.name });
      }
      const { data: row, error } = await sb.from('diario').insert({
        cantiere_id: cantiereId,
        data: data,
        titolo: titolo || null,
        testo: testo || null,
        foto: foto,
        autore: state.user.email,
      }).select().single();
      if (error) throw error;
      if (!state.cantiere.diario) state.cantiere.diario = [];
      state.cantiere.diario.unshift(row);
      state.cantiere.diario.sort((a, b) => (b.data || '').localeCompare(a.data || '') || (b.created_at || '').localeCompare(a.created_at || ''));
      app._diarioFiles = [];
      // Notifica push ai committenti iscritti (best-effort, non blocca la pubblicazione)
      try { sb.functions.invoke('notify-diario', { body: { cantiere_id: cantiereId, titolo: (titolo || 'Nuovo aggiornamento') } }); } catch (e) { /* ignora */ }
      toast('Aggiornamento pubblicato');
      render();
    } catch (e) {
      console.error(e);
      toast(`Errore pubblicazione: ${e.message}`, 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Pubblica aggiornamento'; }
    }
  },

  async deleteDiarioEntry(id) {
    if (!state.isStudio) return;
    const e = state.cantiere?.diario?.find(x => x.id === id);
    if (!e) return;
    if (!confirm('Eliminare questo aggiornamento del diario? Operazione non reversibile.')) return;
    try {
      const paths = (Array.isArray(e.foto) ? e.foto : []).map(f => f.path).filter(Boolean);
      if (paths.length) { const { error: stErr } = await sb.storage.from('documenti').remove(paths); if (stErr) console.warn(stErr); }
      const { error } = await sb.from('diario').delete().eq('id', id);
      if (error) throw error;
      state.cantiere.diario = state.cantiere.diario.filter(x => x.id !== id);
      toast('Aggiornamento eliminato');
      render();
    } catch (err) {
      console.error(err);
      toast(`Errore eliminazione: ${err.message}`, 'error');
    }
  },

  apriDiarioFoto(entryId, fotoIndex) {
    const e = state.cantiere?.diario?.find(x => x.id === entryId);
    if (!e || !Array.isArray(e.foto)) return;
    const items = e.foto.map(f => ({ path: f.path, nome: f.nome }));
    app.openLightbox(items, fotoIndex);
  },

  // ----- NOTIFICHE PUSH (committente) -----
  async controllaPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) {
      state._pushSupportato = false; render(); return;
    }
    state._pushSupportato = true;
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      state._pushAttivo = !!sub && Notification.permission === 'granted';
    } catch (e) { state._pushAttivo = false; }
    render();
  },

  async attivaPush() {
    if (!state._pushSupportato) { toast('Notifiche non supportate da questo browser', 'error'); return; }
    if (!VAPID_PUBLIC_KEY || VAPID_PUBLIC_KEY.indexOf('INCOLLA') === 0) { toast('Notifiche non ancora configurate dallo studio', 'error'); return; }
    try {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { toast('Permesso notifiche non concesso', 'error'); return; }
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
      const j = sub.toJSON();
      const { error } = await sb.from('push_subscriptions').upsert({
        endpoint: j.endpoint,
        p256dh: j.keys.p256dh,
        auth: j.keys.auth,
        user_id: state.user ? state.user.id : null,
        cantiere_id: state.cantiere ? state.cantiere.anagrafica.id : null,
      }, { onConflict: 'endpoint' });
      if (error) throw error;
      state._pushAttivo = true;
      toast('Notifiche attivate');
      render();
    } catch (e) {
      console.error(e);
      toast(`Errore attivazione notifiche: ${e.message}`, 'error');
    }
  },

  async disattivaPush() {
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        await sb.from('push_subscriptions').delete().eq('endpoint', sub.endpoint);
        await sub.unsubscribe();
      }
      state._pushAttivo = false;
      toast('Notifiche disattivate');
      render();
    } catch (e) {
      console.error(e);
      toast(`Errore: ${e.message}`, 'error');
    }
  },

  async deleteDocumento(id) {
    if (!state.isStudio) return;
    const d = state.cantiere?.documenti?.find(x => x.id === id);
    if (!d) return;
    if (!confirm(`Eliminare il documento "${d.nome_file}"? Operazione non reversibile.`)) return;
    try {
      // Elimino file fisico
      const { error: stErr } = await sb.storage.from('documenti').remove([d.storage_path]);
      if (stErr) console.warn('Errore eliminazione storage:', stErr);
      // Elimino metadato
      const { error: dbErr } = await sb.from('documenti').delete().eq('id', id);
      if (dbErr) throw dbErr;
      state.cantiere.documenti = state.cantiere.documenti.filter(x => x.id !== id);
      render();
      toast('Documento eliminato');
    } catch (e) {
      console.error(e);
      toast(`Errore: ${e.message}`, 'error');
    }
  },

  async creaCartella() {
    if (!state.isStudio || !state.cantiere) return;
    const nome = prompt('Nome della nuova cartella:');
    if (!nome || !nome.trim()) return;
    const safeCartella = nome.replace(/[^a-zA-Z0-9 \-_]/g, '_').trim();
    // Le "cartelle" sono virtuali: esistono solo se un documento ha quel valore in cartella.
    // Per crearne una vuota, inserisco un placeholder che il render filtrerà.
    // Soluzione semplice: salvo il nome cartella nello state UI corrente
    if (!state.cartelleVuote) state.cartelleVuote = new Set();
    state.cartelleVuote.add(safeCartella);
    state.cartellaAperta = safeCartella;
    render();
    toast(`Cartella "${safeCartella}" creata`);
  },

  apriCartella(nome) {
    state.cartellaAperta = nome;
    render();
  },

  chiudiCartella() {
    state.cartellaAperta = null;
    render();
  },

  async eliminaCartella(nome) {
    if (!state.isStudio || !state.cantiere) return;
    const docsInCartella = state.cantiere.documenti.filter(d => d.cartella === nome);
    if (docsInCartella.length > 0) {
      if (!confirm(`La cartella "${nome}" contiene ${docsInCartella.length} document${docsInCartella.length === 1 ? 'o' : 'i'}. Eliminare cartella e tutti i suoi documenti?`)) return;
      try {
        const paths = docsInCartella.map(d => d.storage_path);
        await sb.storage.from('documenti').remove(paths);
        const ids = docsInCartella.map(d => d.id);
        await sb.from('documenti').delete().in('id', ids);
        state.cantiere.documenti = state.cantiere.documenti.filter(d => d.cartella !== nome);
      } catch (e) { console.error(e); toast('Errore: ' + e.message, 'error'); return; }
    }
    if (state.cartelleVuote) state.cartelleVuote.delete(nome);
    if (state.cartellaAperta === nome) state.cartellaAperta = null;
    render();
    toast('Cartella eliminata');
  },

  // Backup completo dati (solo studio)
  async creaBackup() {
    if (!state.isStudio) return;
    const statusEl = document.getElementById('backup-status');
    const btn = document.getElementById('backup-btn');
    const setStatus = (msg, isErr) => {
      if (statusEl) {
        statusEl.textContent = msg;
        statusEl.className = isErr ? 'backup-status err' : 'backup-status ok';
      }
    };
    if (btn) { btn.disabled = true; btn.textContent = 'Creazione backup...'; }

    try {
      setStatus('Caricamento cantieri...');
      const [cantieri, contatti, attivita, forniture, costiTec, costiCostr, pagamenti, note, documenti, liste, accessi] = await Promise.all([
        sb.from('cantieri').select('*').order('created_at'),
        sb.from('contatti').select('*'),
        sb.from('attivita').select('*'),
        sb.from('forniture').select('*'),
        sb.from('costi_tecnici').select('*'),
        sb.from('costi_costruzione').select('*'),
        sb.from('pagamenti').select('*'),
        sb.from('note').select('*'),
        sb.from('documenti').select('*'),
        sb.from('liste').select('*').order('lista_key, ord'),
        sb.from('accessi_cliente').select('*'),
      ]);

      // Controllo errori
      const errors = [cantieri, contatti, attivita, forniture, costiTec, costiCostr, pagamenti, note, documenti, liste, accessi]
        .filter(r => r.error).map(r => r.error.message);
      if (errors.length > 0) throw new Error(errors.join('; '));

      const ora = new Date();
      const backup = {
        meta: {
          versione: '1.0',
          generato_il: ora.toISOString(),
          generato_da: state.user.email,
          progetto_supabase: SUPABASE_URL,
          totale_cantieri: (cantieri.data || []).length,
          nota: 'Backup completo dati ekōD Gestione Cantieri. Non include i file fisici dello storage documenti (solo i loro metadati).',
        },
        cantieri: cantieri.data || [],
        contatti: contatti.data || [],
        attivita: attivita.data || [],
        forniture: forniture.data || [],
        costi_tecnici: costiTec.data || [],
        costi_costruzione: costiCostr.data || [],
        pagamenti: pagamenti.data || [],
        note: note.data || [],
        documenti: documenti.data || [],
        liste: liste.data || [],
        accessi_cliente: accessi.data || [],
      };

      // Conta righe totali
      const totRighe = backup.cantieri.length + backup.contatti.length + backup.attivita.length
        + backup.forniture.length + backup.costi_tecnici.length + backup.costi_costruzione.length
        + backup.pagamenti.length + backup.note.length + backup.documenti.length
        + backup.liste.length + backup.accessi_cliente.length;

      // Genera filename con timestamp leggibile
      const z = n => String(n).padStart(2, '0');
      const stamp = `${ora.getFullYear()}${z(ora.getMonth()+1)}${z(ora.getDate())}_${z(ora.getHours())}${z(ora.getMinutes())}`;
      const filename = `ekod_backup_${stamp}.json`;

      // Download via blob
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      // Aggiorna ultimo backup nello state UI
      state.ultimoBackup = {
        ora: ora,
        nomeFile: filename,
        dimensione: blob.size,
        cantieri: backup.cantieri.length,
        righeTotali: totRighe,
      };

      setStatus(`✓ Backup completato: ${filename} (${fmtBytes(blob.size)}, ${backup.cantieri.length} cantieri, ${totRighe} righe totali)`);
      toast('Backup scaricato');
    } catch (e) {
      console.error(e);
      setStatus(`Errore: ${e.message}`, true);
      toast('Errore durante il backup', 'error');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Scarica backup'; }
      // Re-render per aggiornare la sezione "ultimo backup"
      if (state.view === 'backup') render();
    }
  },

  // Logout
  async logout() {
    if (!confirm('Disconnettersi?')) return;
    await doLogout();
  },
};

  const inc = pags.reduce((s, p) => s + (parseFloat(p.importo_incass) || 0), 0);

/* ============================================================
   ORDINAMENTO
   ============================================================ */
// Tipologia di ogni campo per scegliere il comparatore corretto
const FIELD_TYPES = {
  // contatti
  categoria: 'text', azienda: 'text', referente: 'text', telefono: 'text', email: 'text',
  // attivita
  nome: 'text', responsabile: 'text', inizio: 'date', fine: 'date', stato: 'text', avanzamento: 'num',
  // costi (forniture, tecnici, costruzione)
  n_ordine: 'text', prodotto: 'text', fornitore: 'text', descrizione: 'text', professionista: 'text',
  quantita: 'num', um: 'text', costo_unit: 'num', iva: 'text',
  data_ordine: 'date', consegna_prev: 'date', consegna_eff: 'date',
  data_prev: 'date', data_appr: 'date', data_saldo: 'date',
  // pagamenti
  causale: 'text', importo_prev: 'num', importo_incass: 'num',
  data_prevista: 'date', data_fattura: 'date', n_fattura: 'text', data_incasso: 'date',
  // note
  data: 'date', tipo: 'text',
  // colonne calcolate
  __costo_tot: 'computed_total', __residuo: 'computed_residuo', __perc: 'computed_perc',
  __durata: 'computed_durata',
  note: 'text',
};

function compareValues(va, vb, type, dir) {
  // null/vuoti vanno sempre in fondo
  const aEmpty = va == null || va === '';
  const bEmpty = vb == null || vb === '';
  if (aEmpty && bEmpty) return 0;
  if (aEmpty) return 1;   // a in fondo
  if (bEmpty) return -1;  // b in fondo

  let cmp = 0;
  if (type === 'num') {
    cmp = (parseFloat(va) || 0) - (parseFloat(vb) || 0);
  } else if (type === 'date') {
    cmp = String(va).localeCompare(String(vb)); // ISO yyyy-mm-dd ordina correttamente come stringa
  } else {
    cmp = String(va).localeCompare(String(vb), 'it', { sensitivity: 'base', numeric: true });
  }
  return dir === 'desc' ? -cmp : cmp;
}

// Restituisce il valore "ordinabile" per un campo, gestendo anche colonne calcolate
function getSortValue(row, field) {
  if (field === '__costo_tot')   return rowTotal(row);
  if (field === '__residuo')     {
    const prev = parseFloat(row.importo_prev) || 0;
    const inc = parseFloat(row.importo_incass) || 0;
    return prev ? (prev - inc) : null;
  }
  if (field === '__perc')        {
    const prev = parseFloat(row.importo_prev) || 0;
    const inc = parseFloat(row.importo_incass) || 0;
    return prev > 0 ? (inc / prev) : null;
  }
  if (field === '__durata') {
    if (!row.inizio || !row.fine) return null;
    return daysBetween(row.inizio, row.fine);
  }
  return row[field];
}

function sortedRows(sezione) {
  let arr = state.cantiere?.[sezione];
  if (!arr) return [];

  // --- Applico filtri (solo per sezioni che li hanno: forniture, pagamenti) ---
  const f = state.filtri && state.filtri[sezione];
  if (f) {
    // Filtro testuale: cerca su tutti i valori di testo della riga
    if (f.q && f.q.trim()) {
      const needle = f.q.trim().toLowerCase();
      arr = arr.filter(row => {
        return Object.values(row).some(val => {
          if (val == null) return false;
          return String(val).toLowerCase().includes(needle);
        });
      });
    }
    // Filtro stato
    if (f.stato) {
      arr = arr.filter(row => (row.stato || '') === f.stato);
    }
  }

  // --- Applico ordinamento ---
  const s = state.sort[sezione];
  if (!s || !s.field || !s.dir) return arr;
  const type = FIELD_TYPES[s.field] || 'text';
  return [...arr].sort((a, b) => compareValues(
    getSortValue(a, s.field), getSortValue(b, s.field), type, s.dir
  ));
}

// Click su intestazione: alterna asc → desc → null (default originale)
function toggleSort(sezione, field) {
  if (!state.sort) state.sort = {};
  const cur = state.sort[sezione];
  let next;
  if (!cur || cur.field !== field) {
    next = { field, dir: 'asc' };
  } else if (cur.dir === 'asc') {
    next = { field, dir: 'desc' };
  } else if (cur.dir === 'desc') {
    next = { field: null, dir: null };  // ordine originale
  } else {
    next = { field, dir: 'asc' };
  }
  state.sort[sezione] = next;
  render();
}
window.toggleSort = toggleSort;

// Filtri sezioni (forniture, pagamenti)
let _filtroTimer = null;
function setFiltroQuery(sezione, value) {
  if (!state.filtri[sezione]) state.filtri[sezione] = { q: '', stato: '' };
  state.filtri[sezione].q = value;
  // Debounce: ri-renderizza dopo 200ms di pausa nella digitazione
  clearTimeout(_filtroTimer);
  _filtroTimer = setTimeout(() => {
    render();
    // Ripristino il focus sull'input dopo il re-render
    const input = document.querySelector(`[data-filtro-input="${sezione}"]`);
    if (input) {
      input.focus();
      const len = input.value.length;
      input.setSelectionRange(len, len);
    }
  }, 200);
}
function setFiltroStato(sezione, value) {
  if (!state.filtri[sezione]) state.filtri[sezione] = { q: '', stato: '' };
  state.filtri[sezione].stato = value;
  render();
}
function clearFiltri(sezione) {
  state.filtri[sezione] = { q: '', stato: '' };
  render();
}
window.setFiltroQuery = setFiltroQuery;
window.setFiltroStato = setFiltroStato;
window.clearFiltri = clearFiltri;

// Helper: HTML per intestazione cliccabile con freccia
function sortableTh(sezione, field, label, align) {
  const s = state.sort[sezione] || {};
  const active = s.field === field && s.dir;
  let arrow = '<span class="sort-arrow">↕</span>';
  if (active === 'asc')  arrow = '<span class="sort-arrow active">▲</span>';
  if (active === 'desc') arrow = '<span class="sort-arrow active">▼</span>';
  const alignStyle = align === 'right' ? 'text-align:right;' : '';
  return `<th class="sortable ${active?'sorted':''}" style="${alignStyle}cursor:pointer; user-select:none;" onclick="toggleSort('${sezione}','${field}')">${escapeHtml(label)} ${arrow}</th>`;
}

/* ============================================================
   DASHBOARD (solo studio)
   ============================================================ */
function renderDashboard() {
  if (!state.isStudio) {
    // Il cliente non ha dashboard; rimando alla sua scheda
    if (state.cantieri.length) {
      setTimeout(() => app.goto('cantiere', { cantiereId: state.cantieri[0].id }), 0);
    }
    return `<div class="empty-state"><div class="title">Nessun cantiere disponibile</div><div class="desc">Lo studio non ti ha ancora dato accesso a nessun cantiere.</div></div>`;
  }

  // Priorità ordinamento per stato: attivi prima, conclusi/sospesi dopo
  // Più basso = più in alto nell'elenco
  function statoPriority(stato) {
    const s = (stato || '').toLowerCase().trim();
    if (!s) return 5;                                     // senza stato → in mezzo
    if (s.includes('progetto') || s.includes('da iniziare') || s.includes('preliminare')) return 1;
    if (s.includes('corso') || s.includes('demoliz') || s.includes('impiant') || s.includes('finitur') || s.includes('strutt')) return 2;
    if (s.includes('ritardo')) return 3;
    if (s.includes('sospes') || s.includes('pausa')) return 6;
    if (s.includes('complet') || s.includes('conclus') || s.includes('chiuso') || s.includes('archiv')) return 9;
    return 4;
  }

  function isAttivo(stato) {
    return statoPriority(stato) <= 4;
  }

  // Applico filtro
  let cantieri = [...state.cantieri];
  const filtro = state.filterCantieri || 'tutti';
  if (filtro === 'attivi') {
    cantieri = cantieri.filter(c => isAttivo(c.stato_attuale));
  } else if (filtro === 'conclusi') {
    cantieri = cantieri.filter(c => statoPriority(c.stato_attuale) >= 9);
  } else if (filtro === 'sospesi') {
    cantieri = cantieri.filter(c => {
      const p = statoPriority(c.stato_attuale);
      return p === 6;
    });
  }

  // Applico ordinamento
  const sort = state.sortCantieri || 'stato_nome';
  cantieri.sort((a, b) => {
    if (sort === 'stato_nome') {
      const ps = statoPriority(a.stato_attuale) - statoPriority(b.stato_attuale);
      if (ps !== 0) return ps;
      return (a.nome || '').localeCompare(b.nome || '', 'it', { sensitivity: 'base' });
    }
    if (sort === 'nome') {
      return (a.nome || '').localeCompare(b.nome || '', 'it', { sensitivity: 'base' });
    }
    if (sort === 'data_inizio_recente') {
      const da = a.data_inizio || '';
      const db = b.data_inizio || '';
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return db.localeCompare(da);
    }
    if (sort === 'data_inizio_vecchia') {
      const da = a.data_inizio || '';
      const db = b.data_inizio || '';
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return da.localeCompare(db);
    }
    if (sort === 'creazione_recente') {
      return (b.created_at || '').localeCompare(a.created_at || '');
    }
    return 0;
  });

  // Conteggi per i pulsanti filtro
  const nTutti = state.cantieri.length;
  const nAttivi = state.cantieri.filter(c => isAttivo(c.stato_attuale)).length;
  const nSospesi = state.cantieri.filter(c => statoPriority(c.stato_attuale) === 6).length;
  const nConclusi = state.cantieri.filter(c => statoPriority(c.stato_attuale) >= 9).length;

  // Per il raggruppamento visivo nell'ordinamento "stato_nome": aggiungo separatori
  let listaHTML;
  if (sort === 'stato_nome' && filtro === 'tutti') {
    // Raggruppo visivamente per macro-stato
    const gruppi = [
      { etichetta: 'In corso',  test: c => isAttivo(c.stato_attuale) },
      { etichetta: 'Sospesi',   test: c => statoPriority(c.stato_attuale) === 6 },
      { etichetta: 'Conclusi',  test: c => statoPriority(c.stato_attuale) >= 9 },
    ];
    listaHTML = gruppi.map(g => {
      const itemsGruppo = cantieri.filter(g.test);
      if (itemsGruppo.length === 0) return '';
      return `
        <div class="cantieri-group-label">${g.etichetta} <span class="count">${itemsGruppo.length}</span></div>
        ${itemsGruppo.map(renderCantiereCard).join('')}
      `;
    }).join('');
  } else {
    listaHTML = cantieri.map(renderCantiereCard).join('');
  }

  return `
    <div class="page-header">
      <div class="header-row">
        <div>
          <div class="page-title">I tuoi <em>cantieri</em></div>
          <div class="page-subtitle">Studio ekōD · Gestione cantieri online. Clicca su un cantiere per aprirlo.</div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="app.creaCantiere()">${I.plus} Nuovo cantiere</button>
        </div>
      </div>
    </div>

    ${state.cantieri.length === 0 ? `
      <div class="empty-state">
        <div class="icn">${I.building}</div>
        <div class="title">Nessun cantiere</div>
        <div class="desc">Crea il primo cantiere per iniziare. Ogni cantiere può essere condiviso con il committente.</div>
        <button class="btn btn-primary" onclick="app.creaCantiere()">${I.plus} Crea il primo cantiere</button>
